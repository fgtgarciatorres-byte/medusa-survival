<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish Survival: Hall of Fame Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000511; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a33 0%, #000511 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
        }
        
        #ui {
            position: fixed; top: 20px; width: 100%; display: none;
            justify-content: space-around; align-items: center;
            color: #00d4ff; font-weight: bold; font-size: 18px; z-index: 500; pointer-events: none;
        }

        .hp-bar { width: 80px; height: 12px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff3300; transition: width 0.3s; }

        button {
            padding: 15px 30px; background: #ff00ff; color: white; font-size: 20px; 
            font-weight: bold; border: none; border-radius: 50px; box-shadow: 0 0 20px #ff00ff; 
            cursor: pointer; margin-top: 10px; -webkit-tap-highlight-color: transparent;
        }

        input {
            padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; background: rgba(0,0,0,0.5);
            color: white; font-size: 18px; text-align: center; margin-bottom: 10px; width: 200px;
        }

        #score-list {
            background: rgba(0, 212, 255, 0.1); padding: 15px; border-radius: 15px;
            border: 1px solid #00d4ff; margin-top: 20px; min-width: 260px; max-height: 200px; overflow-y: auto;
        }
        .score-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0,212,255,0.2); font-size: 14px; }

        #boss-alert {
            position: fixed; top: 100px; width: 100%; text-align: center;
            color: #ff3300; font-size: 28px; font-weight: 900; display: none;
            text-shadow: 0 0 20px red; z-index: 400; animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui">
        <div>PTS: <span id="score">0</span></div>
        <div style="display:flex; align-items:center; gap:8px;">
            ❤️ <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div>LVL: <span id="level">1</span></div>
    </div>

    <div id="boss-alert">¡JEFE TORTUGA AL ACECHO!</div>

    <div id="start-screen" class="overlay">
        <h1 style="color:#ff00ff; font-size:45px; margin:0; text-shadow: 0 0 20px #ff00ff;">🪼 JELLYFISH</h1>
        <h2 style="color:#00d4ff; margin:0 0 10px 0;">SURVIVAL</h2>
        <div style="font-size: 50px; margin-bottom: 20px;">🪼</div>
        <button id="play-btn">¡JUGAR!</button>
        <p style="margin-top:20px; font-size:14px; opacity:0.8;">Cangrejos 🦀 = Vida | Burbujas Azules 🔵 = Escudo</p>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <h1 style="color:#ff3300; font-size:35px; margin:0;">¡FIN DEL VIAJE!</h1>
        <p style="font-size: 20px; margin: 10px 0;">Puntuación: <span id="final-score" style="color:#00d4ff;">0</span></p>
        
        <div id="save-area">
            <input type="text" id="player-name" placeholder="Tu nombre" maxlength="12">
            <br>
            <button onclick="saveAndReset()">GUARDAR PUNTUACIÓN</button>
        </div>

        <div id="score-list">
            <h3 style="margin:0 0 10px 0; color:#00d4ff; font-size:16px;">TOP 10 PUNTUACIONES</h3>
            <div id="high-scores-container"></div>
        </div>
        <button onclick="location.reload()" style="background:#444; box-shadow:none; font-size:14px; padding:10px 20px;">REINTENTAR SIN GUARDAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        let audioCtx, gameStarted = false, gameOver = false;
        let score = 0, hp = 3, level = 1, shieldTime = 0, invulTime = 0;
        let isBossMode = false, bossX = width/2, bossDir = 3, bossShots = 0;

        const player = { x: width/2, y: height/2, r: 25 };
        const objects = [];
        const particles = Array.from({length: 30}, () => ({x: Math.random()*width, y: Math.random()*height, s: Math.random()*2, v: Math.random()*0.5+0.1}));

        function playSnd(f, type='sine', d=0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        // --- DIBUJO ---
        function drawMedusa() {
            ctx.save();
            const time = Date.now() * 0.005;
            const hasShield = shieldTime > 0;
            if (invulTime > 0 && Math.floor(Date.now()/100)%2 === 0) ctx.globalAlpha = 0.3;
            if(hasShield) { ctx.shadowBlur = 15; ctx.shadowColor = "cyan"; }

            // Tentáculos
            ctx.strokeStyle = hasShield ? "cyan" : "rgba(230, 180, 255, 0.7)";
            ctx.lineWidth = 3; ctx.lineCap = "round";
            for(let i=0; i<5; i++) {
                ctx.beginPath(); ctx.moveTo(player.x - 16 + i*8, player.y + 12);
                for(let j=0; j<3; j++) {
                    let ox = Math.sin(time + i + j) * 8;
                    ctx.quadraticCurveTo(player.x-16+i*8+ox, player.y+20+j*10, player.x-16+i*8, player.y+30+j*10);
                }
                ctx.stroke();
            }
            // Cuerpo
            const grad = ctx.createRadialGradient(player.x, player.y, 5, player.x, player.y, player.r);
            grad.addColorStop(0, hasShield ? "#fff" : "#ffb3e6"); grad.addColorStop(1, hasShield ? "#00ffff" : "#7700ee");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, Math.PI, 0);
            ctx.lineTo(player.x+player.r, player.y+15); ctx.quadraticCurveTo(player.x, player.y+22, player.x-player.r, player.y+15); ctx.fill();
            // Ojos
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 5, 0, 7); ctx.arc(player.x+8, player.y-5, 5, 0, 7); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 2, 0, 7); ctx.arc(player.x+8, player.y-5, 2, 0, 7); ctx.fill();
            ctx.restore();
        }

        function drawTurtle() {
            ctx.save(); ctx.translate(bossX, 80);
            ctx.fillStyle = "#1a3a16"; ctx.beginPath(); ctx.ellipse(0, 0, 55, 40, 0, 0, 7); ctx.fill(); // Caparazón
            ctx.fillStyle = "#66cc5c"; ctx.beginPath(); ctx.ellipse(0, -45, 18, 22, 0, 0, 7); ctx.fill(); // Cabeza
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(-6, -50, 2, 0, 7); ctx.arc(6, -50, 2, 0, 7); ctx.fill(); // Ojos
            ctx.restore();
        }

        // --- LÓGICA DE PERSISTENCIA ---
        function showScores() {
            const scores = JSON.parse(localStorage.getItem('jellyScores')) || [];
            const container = document.getElementById('high-scores-container');
            container.innerHTML = scores.sort((a,b) => b.score - a.score).slice(0, 10).map((s, i) => `
                <div class="score-item">
                    <span>${i+1}. ${s.name}</span>
                    <span style="color:#00d4ff">${s.score} pts</span>
                </div>
            `).join('');
        }

        function saveAndReset() {
            const name = document.getElementById('player-name').value || "Anónimo";
            const scores = JSON.parse(localStorage.getItem('jellyScores')) || [];
            scores.push({ name, score });
            localStorage.setItem('jellyScores', JSON.stringify(scores));
            location.reload();
        }

        // --- MOTOR DE JUEGO ---
        function spawn() {
            if (gameOver || isBossMode || !gameStarted) return;
            const r = Math.random();
            let type = (r > 0.985) ? 'crab' : (r > 0.95 ? 'shield' : (r > 0.88 ? 'star' : (r > 0.80 && level >= 2 ? 'bomb' : 'bubble')));
            objects.push({ x: type === 'crab' ? -40 : Math.random() * width, y: type === 'crab' ? height * 0.85 : -50, vx: type === 'crab' ? 2 : 0, vy: type === 'crab' ? 0 : 2.5 + level * 0.4, size: 20, type, t: 120 });
            setTimeout(spawn, Math.max(300, 1100 - (level * 70)));
        }

        function spawnBossShot() {
            if (!isBossMode || gameOver) return;
            objects.push({ x: bossX, y: 120, vx: 0, vy: 5 + level, size: 14, type: 'bullet' });
            playSnd(150, 'sawtooth');
            if (--bossShots > 0) setTimeout(spawnBossShot, 900 - (level*50));
            else setTimeout(() => { isBossMode = false; document.getElementById('boss-alert').style.display = 'none'; spawn(); }, 3000);
        }

        function update() {
            if(!gameStarted || gameOver) return;
            if (score > 0 && score % 50 === 0 && !isBossMode) { isBossMode = true; bossShots = 10 + level; document.getElementById('boss-alert').style.display = 'block'; objects.length = 0; setTimeout(spawnBossShot, 2000); }
            if (isBossMode) { bossX += bossDir; if(bossX > width-60 || bossX < 60) bossDir *= -1; }
            shieldTime = Math.max(0, shieldTime - 16); invulTime = Math.max(0, invulTime - 16);

            for (let i = 0; i < objects.length; i++) {
                let o = objects[i]; o.x += o.vx; o.y += o.vy;
                if (o.type === 'bomb' && --o.t <= 0) { objects.push({x:o.x, y:o.y, vx:3, vy:3, size:10, type:'bullet'}); objects.push({x:o.x, y:o.y, vx:-3, vy:3, size:10, type:'bullet'}); objects.splice(i, 1); i--; continue; }
                let d = Math.hypot(player.x - o.x, player.y - o.y);
                if (d < player.r + o.size - 5) {
                    if (o.type === 'star') { score += 15; playSnd(800); }
                    else if (o.type === 'shield') { shieldTime = 6000; playSnd(1000); }
                    else if (o.type === 'crab') { hp = Math.min(3, hp+1); playSnd(600); }
                    else if (shieldTime <= 0 && invulTime <= 0) {
                        hp--; invulTime = 1500; playSnd(80, 'sawtooth');
                        if (hp <= 0) { gameOver = true; document.getElementById('game-over-screen').style.display = 'flex'; document.getElementById('final-score').innerText = score; showScores(); }
                    }
                    if (o.type !== 'bullet' || shieldTime > 0) { objects.splice(i, 1); i--; }
                } else if (o.y > height + 100 || o.x > width + 100) { if(o.type==='bubble') score++; objects.splice(i,1); i--; }
            }
            level = Math.floor(score/40) + 1;
            document.getElementById('score').innerText = score; document.getElementById('level').innerText = level;
            document.getElementById('hp-fill').style.width = (hp/3*100) + '%';
        }

        function loop() {
            ctx.fillStyle = isBossMode ? "#1a0505" : "#000511"; ctx.fillRect(0,0,width,height);
            particles.forEach(p => { p.y += p.v; if(p.y > height) p.y = 0; ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill(); });
            if(isBossMode) drawTurtle();
            objects.forEach(o => { ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, 7); ctx.fillStyle = o.type === 'star' ? 'yellow' : (o.type === 'shield' ? '#00ffff' : (o.type === 'crab' ? '#ff4400' : (o.type === 'bullet' ? 'red' : (o.type === 'bomb' ? 'orange' : 'white')))); ctx.fill(); });
            if(gameStarted) { drawMedusa(); update(); }
            requestAnimationFrame(loop);
        }

        const start = () => { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); gameStarted = true; document.getElementById('start-screen').style.display = 'none'; document.getElementById('ui').style.display = 'flex'; spawn(); };
        document.getElementById('play-btn').addEventListener('click', start);
        document.getElementById('play-btn').addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        window.addEventListener('touchmove', (e) => { player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; }, {passive: false});
        loop();
    </script>
</body>
</html>
