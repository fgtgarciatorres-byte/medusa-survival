<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jellyfish Deep Sea</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000511; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #00d4ff; font-size: 24px;
            font-weight: bold; text-shadow: 0 0 10px #00d4ff;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameOver = false;
        let frame = 0;

        const player = { x: canvas.width / 2, y: canvas.height / 2, radius: 25 };
        const obstacles = [];
        const particles = Array.from({ length: 50 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.2
        }));

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            player.x = touch.clientX;
            player.y = touch.clientY;
        });

        function spawnObstacle() {
            if (gameOver) return;
            const size = Math.random() * 25 + 15;
            obstacles.push({
                x: Math.random() * canvas.width,
                y: -size,
                size: size,
                speed: Math.random() * 2 + 3,
                rotation: Math.random() * Math.PI * 2,
                pulse: 0
            });
            setTimeout(spawnObstacle, Math.max(200, 1000 - score * 5));
        }

        function drawMedusa(x, y) {
            ctx.save();
            const time = Date.now() * 0.005;
            
            // Cuerpo (Campana)
            const grad = ctx.createRadialGradient(x, y, 5, x, y, 30);
            grad.addColorStop(0, '#ff99dd');
            grad.addColorStop(1, '#6600ff');
            
            ctx.beginPath();
            ctx.arc(x, y, player.radius, Math.PI, 0);
            ctx.lineTo(x + player.radius, y + 10);
            ctx.quadraticCurveTo(x, y + 20, x - player.radius, y + 10);
            ctx.fillStyle = grad;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff00ff';
            ctx.fill();

            // Ojos
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(x - 8, y - 5, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 8, y - 5, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x - 8, y - 5, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 8, y - 5, 2, 0, Math.PI * 2); ctx.fill();

            // Tentáculos ondulantes
            for(let i = 0; i < 5; i++) {
                const tx = x - 20 + (i * 10);
                ctx.beginPath();
                ctx.moveTo(tx, y + 15);
                for(let j = 0; j < 3; j++) {
                    const offset = Math.sin(time + i) * 10;
                    ctx.quadraticCurveTo(tx + offset, y + 25 + (j * 10), tx, y + 35 + (j * 10));
                }
                ctx.strokeStyle = "rgba(255, 150, 255, 0.6)";
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawObstacle(o) {
            ctx.save();
            // Burbuja "peligrosa" con brillo
            const bubbleGrad = ctx.createRadialGradient(o.x - o.size/3, o.y - o.size/3, o.size/10, o.x, o.y, o.size);
            bubbleGrad.addColorStop(0, "rgba(255, 255, 255, 0.8)");
            bubbleGrad.addColorStop(0.2, "rgba(0, 212, 255, 0.4)");
            bubbleGrad.addColorStop(1, "rgba(0, 80, 255, 0.1)");

            ctx.beginPath();
            ctx.arc(o.x, o.y, o.size, 0, Math.PI * 2);
            ctx.fillStyle = bubbleGrad;
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Reflejo blanco en la burbuja
            ctx.beginPath();
            ctx.arc(o.x - o.size/2.5, o.y - o.size/2.5, o.size/5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.fill();
            ctx.restore();
        }

        function draw() {
            // Fondo marino con gradiente
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#001a33');
            bgGrad.addColorStop(1, '#000511');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Partículas de fondo (Plankton)
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            particles.forEach(p => {
                p.y += p.speed;
                if (p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            if (!gameOver) {
                drawMedusa(player.x, player.y);

                for (let i = 0; i < obstacles.length; i++) {
                    const o = obstacles[i];
                    o.y += o.speed;
                    drawObstacle(o);

                    const dx = player.x - o.x;
                    const dy = player.y - o.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < player.radius + o.size - 5) {
                        gameOver = true;
                        setTimeout(() => {
                            alert("GAME OVER\nScore: " + score);
                            location.reload();
                        }, 10);
                    }

                    if (o.y > canvas.height + o.size) {
                        obstacles.splice(i, 1);
                        i--;
                        score++;
                        scoreElement.innerText = score;
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        spawnObstacle();
        draw();
    </script>
</body>
</html>
