<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish: Turtle Boss Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000511; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #00d4ff; font-size: 20px;
            font-weight: bold; text-shadow: 0 0 10px #00d4ff;
            pointer-events: none;
        }
        #boss-ui {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            color: #ff3300; font-size: 24px; display: none; text-shadow: 0 0 10px red;
        }
    </style>
</head>
<body>
    <div id="ui">PUNTOS: <span id="score">0</span> | NIVEL: <span id="level">1</span></div>
    <div id="boss-ui">¡ALERTA: TORTUGA AL ACECHO!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let level = 1;
        let gameOver = false;
        let shieldTime = 0;
        let isBossMode = false;
        let bossX = canvas.width / 2;
        let bossDirection = 2;
        let bossShots = 0;

        const player = { x: canvas.width / 2, y: canvas.height * 0.8, radius: 22 };
        const objects = [];
        const particles = Array.from({ length: 30 }, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            size: Math.random() * 2, speed: Math.random() * 0.5 + 0.2
        }));

        window.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX;
            player.y = e.touches[0].clientY;
        });

        function spawnObject() {
            if (gameOver || isBossMode) return;
            
            const rand = Math.random();
            let type = 'obstacle';
            if (rand > 0.94) type = 'shield';
            else if (rand > 0.85) type = 'star';

            objects.push({
                x: Math.random() * canvas.width, y: -30,
                size: type === 'obstacle' ? 15 + Math.random() * 20 : 20,
                type: type,
                speed: 3 + (level * 0.5)
            });

            setTimeout(spawnObject, Math.max(200, 1000 - (level * 50)));
        }

        function spawnBossShot() {
            if (!isBossMode || gameOver) return;
            objects.push({
                x: bossX, y: 100, size: 12, type: 'bullet', speed: 6 + level
            });
            bossShots++;
            if (bossShots < 15) setTimeout(spawnBossShot, 800);
            else {
                setTimeout(() => { 
                    isBossMode = false; 
                    document.getElementById('boss-ui').style.display = 'none';
                    spawnObject(); 
                }, 3000);
            }
        }

        function drawTurtle(x, y) {
            ctx.save();
            // Caparazón
            ctx.fillStyle = "#2d5a27";
            ctx.beginPath();
            ctx.ellipse(x, y, 45, 35, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#1a3317"; ctx.lineWidth = 3; ctx.stroke();
            // Cabeza
            ctx.fillStyle = "#4caf50";
            ctx.beginPath(); ctx.arc(x + 40 * (bossDirection/Math.abs(bossDirection)), y - 10, 15, 0, Math.PI*2); ctx.fill();
            // Ojos enojados
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(x + 45 * (bossDirection/Math.abs(bossDirection)), y - 12, 3, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function update() {
            if (gameOver) return;
            
            // Lógica del Jefe
            if (score > 0 && score % 50 === 0 && !isBossMode) {
                isBossMode = true;
                bossShots = 0;
                document.getElementById('boss-ui').style.display = 'block';
                setTimeout(spawnBossShot, 2000);
            }

            if (isBossMode) {
                bossX += bossDirection;
                if (bossX > canvas.width - 50 || bossX < 50) bossDirection *= -1;
            }

            shieldTime = Math.max(0, shieldTime - 16);
            level = Math.floor(score / 20) + 1;

            for (let i = 0; i < objects.length; i++) {
                let o = objects[i];
                o.y += o.speed;

                const dist = Math.hypot(player.x - o.x, player.y - o.y);
                if (dist < player.radius + o.size) {
                    if ((o.type === 'obstacle' || o.type === 'bullet') && shieldTime <= 0) {
                        gameOver = true;
                        alert("¡La tortuga te alcanzó! Puntos: " + score);
                        location.reload();
                    } else if (o.type === 'star') { score += 10; objects.splice(i, 1); i--; }
                    else if (o.type === 'shield') { shieldTime = 5000; objects.splice(i, 1); i--; }
                    else if (shieldTime > 0) { objects.splice(i, 1); i--; }
                }

                if (o.y > canvas.height + 50) {
                    if (o.type === 'obstacle') score++;
                    objects.splice(i, 1); i--;
                }
            }
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
        }

        function draw() {
            ctx.fillStyle = isBossMode ? "#1a0000" : "#000511";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.y += p.speed; if (p.y > canvas.height) p.y = 0;
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
            });

            if (isBossMode) drawTurtle(bossX, 70);

            // Dibujar Medusa
            ctx.save();
            if(shieldTime > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "cyan"; }
            ctx.fillStyle = shieldTime > 0 ? "cyan" : "#ff99cc";
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, Math.PI, 0); ctx.fill();
            for(let j=0; j<3; j++) {
                ctx.fillRect(player.x - 15 + (j*12), player.y, 4, 20 + Math.sin(Date.now()/100)*5);
            }
            ctx.restore();

            objects.forEach(o => {
                ctx.beginPath();
                ctx.arc(o.x, o.y, o.size, 0, 7);
                ctx.fillStyle = o.type === 'bullet' ? 'red' : (o.type === 'star' ? 'yellow' : (o.type === 'shield' ? 'cyan' : 'white'));
                ctx.fill();
            });

            update();
            requestAnimationFrame(draw);
        }

        spawnObject();
        draw();
    </script>
</body>
</html>
