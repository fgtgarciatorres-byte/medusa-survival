<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>JELLYFISH SURVIVAL - MAR DE LOS SARGAZOS</title>

<style>

body, html{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000511;
    font-family:'Segoe UI',sans-serif;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:1000;
    color:white;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:30px;
    background:#ff00ff;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #ff00ff;
}

#ui{
    position:fixed;
    top:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    color:#00d4ff;
    font-weight:bold;
    z-index:100;
    text-shadow:0 0 10px #00d4ff;
}

.bar-container{
    border:2px solid white;
    border-radius:10px;
    padding:2px;
}

.bar{
    width:70px;
    height:12px;
    background:rgba(255,255,255,0.15);
    border-radius:8px;
    overflow:hidden;
}

#hp-fill{
    width:100%;
    height:100%;
    background:linear-gradient(90deg,#ff3300,#ff8800);
}

#ep-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00ffcc,#0088ff);
}

#event-alert{
    position:fixed;
    top:90px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:900;
    color:#00ffcc;
    text-shadow:0 0 20px #00ffcc;
    display:none;
    z-index:300;
    animation:blink 0.5s infinite;
}

@keyframes blink{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

</style>
</head>

<body>

<div id="ui">

    <div>PTS: <span id="score">0</span></div>

    <div style="display:flex;align-items:center;gap:5px;">
        ❤️
        <div class="bar-container">
            <div class="bar">
                <div id="hp-fill"></div>
            </div>
        </div>
    </div>

    <div style="display:flex;align-items:center;gap:5px;">
        ⚡
        <div class="bar-container">
            <div class="bar">
                <div id="ep-fill"></div>
            </div>
        </div>
    </div>

    <div>LVL: <span id="level">1</span></div>

</div>

<div id="event-alert">¡ENERGÍA AL MÁXIMO!</div>

<div id="start-screen" class="overlay">

    <h1 style="font-size:50px;color:#ff00ff;">
        🪼 JELLYFISH SURVIVAL
    </h1>

    <button id="play-btn">
        INICIAR
    </button>

</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width,height;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize',resize);

resize();

let gameStarted = false;
let gameOver = false;

let score = 0;
let hp = 3;
let maxHp = 3;

let level = 1;

let energy = 0;
let maxEnergy = 6;

let invulTime = 0;

let shootingTime = 0;
let lastShotFired = 0;

let isBossMode = false;
let bossX = width/2;
let bossDir = 3;
let bossShots = 0;
let nextBossAt = 50;

let turtleBossDefeats = 0;
let sargassoMode = false;

let sharkBossMode = false;
let nextSharkBossAt = 50;

let player = {
    x:width/2,
    y:height*0.8,
    r:25
};

let objects = [];
let particles = [];

let backgroundSeaweed = [];

for(let i=0;i<40;i++){

    backgroundSeaweed.push({

        x:Math.random()*width,
        y:Math.random()*height,
        h:80+Math.random()*180,
        sway:Math.random()*Math.PI*2,
        speed:0.5+Math.random()

    });
}

for(let i=0;i<30;i++){

    particles.push({

        x:Math.random()*width,
        y:Math.random()*height,
        s:Math.random()*2+1,
        v:Math.random()*0.5+0.1

    });
}

function drawBubble(o){

    ctx.save();

    ctx.fillStyle="rgba(180,220,255,0.4)";

    ctx.beginPath();
    ctx.arc(o.x,o.y,o.size,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="rgba(255,255,255,0.7)";
    ctx.stroke();

    ctx.restore();
}

function drawAlga(o){

    ctx.save();

    ctx.translate(o.x,o.y);

    let sway = Math.sin(Date.now()*0.005 + o.y*0.05) * 6;

    ctx.fillStyle="#33cc33";
    ctx.strokeStyle="#1a801a";

    ctx.beginPath();

    ctx.moveTo(0,o.size);

    ctx.quadraticCurveTo(
        o.size+sway,
        0,
        sway,
        -o.size
    );

    ctx.quadraticCurveTo(
        -o.size+sway,
        0,
        0,
        o.size
    );

    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function drawSargassoBackground(){

    ctx.fillStyle="#02191c";
    ctx.fillRect(0,0,width,height);

    backgroundSeaweed.forEach(a=>{

        let wave =
        Math.sin(Date.now()*0.0015 + a.sway)*18;

        ctx.strokeStyle="#4caf50";
        ctx.lineWidth=5;

        ctx.beginPath();

        ctx.moveTo(a.x,height);

        ctx.quadraticCurveTo(
            a.x+wave,
            height-a.h/2,
            a.x+wave*0.5,
            height-a.h
        );

        ctx.stroke();

        a.sway += 0.01*a.speed;

    });
}

function drawSmallShark(o){

    ctx.save();

    ctx.translate(o.x,o.y);

    if(o.vx < 0) ctx.scale(-1,1);

    ctx.fillStyle="#7aa6b8";

    ctx.beginPath();

    ctx.moveTo(-25,0);
    ctx.lineTo(10,-12);
    ctx.lineTo(28,0);
    ctx.lineTo(10,12);

    ctx.closePath();
    ctx.fill();

    ctx.beginPath();

    ctx.moveTo(-5,-10);
    ctx.lineTo(5,-24);
    ctx.lineTo(12,-8);

    ctx.fill();

    ctx.fillStyle="white";

    ctx.beginPath();
    ctx.arc(15,-2,3,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";

    ctx.beginPath();
    ctx.arc(16,-2,1.5,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawExplosiveShark(o){

    ctx.save();

    let flash = Math.sin(Date.now()*0.02) > 0;

    ctx.globalAlpha = flash ? 1 : 0.4;

    drawSmallShark(o);

    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(o.x+10,o.y-8,5,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawPlayer(){

    ctx.save();

    if(invulTime > 0 &&
       Math.floor(Date.now()/100)%2===0){

        ctx.globalAlpha=0.3;
    }

    let time = Date.now()*0.005;

    ctx.strokeStyle="rgba(230,180,255,0.8)";
    ctx.lineWidth=3.5;

    for(let i=0;i<5;i++){

        ctx.beginPath();

        ctx.moveTo(
            player.x -16 + i*8,
            player.y +12
        );

        for(let j=0;j<4;j++){

            let ox =
            Math.sin(time+i*0.8+j*0.5)*10;

            ctx.quadraticCurveTo(
                player.x-16+i*8+ox,
                player.y+20+j*10,
                player.x-16+i*8,
                player.y+35+j*10
            );
        }

        ctx.stroke();
    }

    ctx.fillStyle="#e699ff";

    ctx.beginPath();

    ctx.arc(
        player.x,
        player.y,
        player.r,
        Math.PI,
        0
    );

    ctx.lineTo(player.x+player.r,player.y+15);

    ctx.quadraticCurveTo(
        player.x,
        player.y+25,
        player.x-player.r,
        player.y+15
    );

    ctx.fill();

    ctx.fillStyle="white";

    ctx.beginPath();

    ctx.arc(player.x-8,player.y-5,5,0,Math.PI*2);
    ctx.arc(player.x+8,player.y-5,5,0,Math.PI*2);

    ctx.fill();

    ctx.fillStyle="black";

    ctx.beginPath();

    ctx.arc(player.x-8,player.y-5,2.5,0,Math.PI*2);
    ctx.arc(player.x+8,player.y-5,2.5,0,Math.PI*2);

    ctx.fill();

    ctx.restore();
}

function drawTurtle(){

    let time = Date.now()*0.002;

    ctx.save();

    ctx.translate(bossX,100);

    ctx.fillStyle="#2d5a27";

    for(let i=0;i<4;i++){

        ctx.save();

        ctx.rotate(
            (i<2?-1:1)*0.4 +
            Math.sin(time+i)*0.2
        );

        ctx.translate(
            i<2?-50:50,
            i%2===0?-20:20
        );

        ctx.scale(1,15/35);

        ctx.beginPath();
        ctx.arc(0,0,35,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    let grad = ctx.createRadialGradient(
        0,0,10,
        0,0,70
    );

    grad.addColorStop(0,"#4a9c43");
    grad.addColorStop(1,"#1d3d19");

    ctx.fillStyle=grad;

    ctx.save();

    ctx.scale(1,55/75);

    ctx.beginPath();
    ctx.arc(0,0,75,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    ctx.restore();
}

function drawSharkBoss(){

    ctx.save();

    ctx.translate(bossX,130);

    ctx.fillStyle="#5e7f91";

    ctx.beginPath();

    ctx.moveTo(-140,0);
    ctx.lineTo(60,-50);
    ctx.lineTo(150,0);
    ctx.lineTo(60,50);

    ctx.closePath();

    ctx.fill();

    ctx.beginPath();

    ctx.moveTo(-20,-45);
    ctx.lineTo(20,-95);
    ctx.lineTo(40,-35);

    ctx.fill();

    ctx.fillStyle="white";

    for(let i=0;i<8;i++){

        ctx.beginPath();

        ctx.moveTo(70+i*8,10);
        ctx.lineTo(74+i*8,28);
        ctx.lineTo(78+i*8,10);

        ctx.fill();
    }

    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(90,-10,8,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function spawn(){

    if(gameOver ||
       !gameStarted ||
       isBossMode ||
       sharkBossMode) return;

    let type;

    if(sargassoMode){

        let r=Math.random();

        type =
            r > 0.90 ? 'explosiveShark' :
            r > 0.72 ? 'smallShark' :
            r > 0.60 ? 'alga' :
            r > 0.52 ? 'star' :
            'smallShark';

    }else{

        let r=Math.random();

        type =
            r > 0.96 ? 'crab' :
            r > 0.90 ? 'bomb' :
            r > 0.80 ? 'alga' :
            r > 0.70 ? 'star' :
            'bubble';
    }

    let fromLeft = Math.random()>0.5;

    if(type==='smallShark' ||
       type==='explosiveShark'){

        objects.push({

            x:fromLeft ? -80 : width+80,

            y:180 + Math.random()*(height-300),

            vx:fromLeft ? 4 : -4,
            vy:0,

            size:28,

            type:type,

            t:120,

            dead:false
        });

    }else{

        objects.push({

            x:type==='crab'
                ? -50
                : Math.random()*width,

            y:type==='crab'
                ? height*0.85
                : -50,

            vx:type==='crab'
                ? 2.5
                : (Math.random()-0.5)*2,

            vy:type==='crab'
                ? 0
                : 2.5 + level*0.4,

            size:22,

            type:type,

            t:120,

            dead:false
        });
    }

    setTimeout(
        spawn,
        Math.max(250,950-(level*50))
    );
}

function spawnBossShot(){

    if(!isBossMode || gameOver) return;

    let angle =
    Math.atan2(
        player.y-130,
        player.x-bossX
    );

    objects.push({

        x:bossX,
        y:130,

        vx:Math.cos(angle)*6,
        vy:Math.sin(angle)*6,

        size:15,

        type:'bullet',

        dead:false
    });

    bossShots--;

    if(bossShots > 0){

        setTimeout(spawnBossShot,800);

    }else{

        turtleBossDefeats++;

        if(turtleBossDefeats >= 2){

            sargassoMode = true;

            document.getElementById('event-alert').innerText =
            "🌿 MAR DE LOS SARGAZOS 🌿";

            document.getElementById('event-alert').style.display='block';

            setTimeout(()=>{
                document.getElementById('event-alert').style.display='none';
            },4000);
        }

        setTimeout(()=>{

            isBossMode=false;

            nextBossAt += 100;

            level++;

            spawn();

        },3000);
    }
}

function spawnSharkBossShot(){

    if(!sharkBossMode || gameOver) return;

    let angle =
    Math.atan2(
        player.y-140,
        player.x-bossX
    );

    objects.push({

        x:bossX,
        y:140,

        vx:Math.cos(angle)*7,
        vy:Math.sin(angle)*7,

        size:18,

        type:'bullet',

        dead:false
    });

    bossShots--;

    if(bossShots > 0){

        setTimeout(spawnSharkBossShot,500);

    }else{

        setTimeout(()=>{

            sharkBossMode=false;

            nextSharkBossAt += 120;

            document.getElementById('event-alert').style.display='none';

            spawn();

        },3000);
    }
}

function update(){

    if(!gameStarted || gameOver) return;

    level = Math.floor(score/40)+1;

    if(shootingTime > 0){

        shootingTime -= 16;

        if(Date.now()-lastShotFired > 300){

            objects.push({

                x:player.x,
                y:player.y-player.r,

                vx:0,
                vy:-10,

                size:6,

                type:'playerBullet',

                dead:false
            });

            lastShotFired = Date.now();
        }
    }

    if(score >= nextBossAt &&
       !isBossMode &&
       !sargassoMode){

        isBossMode = true;

        bossShots = 10 + level;

        bossX = width/2;

        objects=[];

        document.getElementById('event-alert').innerText =
        "🐢 JEFE TORTUGA";

        document.getElementById('event-alert').style.display='block';

        setTimeout(spawnBossShot,2000);
    }

    if(
        sargassoMode &&
        score >= nextSharkBossAt &&
        !sharkBossMode &&
        !isBossMode
    ){

        sharkBossMode = true;

        bossShots = 18;

        bossX = width/2;

        objects=[];

        document.getElementById('event-alert').innerText =
        "🦈 MEGALODÓN 🦈";

        document.getElementById('event-alert').style.display='block';

        setTimeout(spawnSharkBossShot,1500);
    }

    if(isBossMode || sharkBossMode){

        bossX += bossDir;

        if(bossX > width-120 ||
           bossX < 120){

            bossDir *= -1;
        }
    }

    invulTime = Math.max(0,invulTime-16);

    objects.forEach(o=>{

        o.x += o.vx;
        o.y += o.vy;

        if(
            o.type==='bomb' ||
            o.type==='explosiveShark'
        ){

            o.t--;

            if(o.t <= 0){

                o.dead=true;

                for(let k=0;k<8;k++){

                    let ang =
                    (k/8)*Math.PI*2;

                    objects.push({

                        x:o.x,
                        y:o.y,

                        vx:Math.cos(ang)*5,
                        vy:Math.sin(ang)*5,

                        size:6,

                        type:'bullet',

                        dead:false
                    });
                }
            }
        }

        let dx = player.x - o.x;
        let dy = player.y - o.y;

        let dist =
        Math.sqrt(dx*dx + dy*dy);

        if(dist < player.r + o.size -5){

            if(
                o.type==='bubble' ||
                o.type==='bullet' ||
                o.type==='smallShark' ||
                o.type==='explosiveShark'
            ){

                if(invulTime <= 0){

                    hp--;

                    invulTime = 1500;

                    if(hp <= 0){

                        gameOver=true;
                    }
                }
            }

            else if(o.type==='alga'){

                energy =
                Math.min(maxEnergy,energy+1);

                if(energy >= maxEnergy){

                    energy = 0;

                    shootingTime = 5000;

                    document.getElementById('event-alert').innerText =
                    "⚡ ENERGÍA MÁXIMA ⚡";

                    document.getElementById('event-alert').style.display='block';

                    setTimeout(()=>{
                        document.getElementById('event-alert').style.display='none';
                    },2000);
                }
            }

            o.dead = true;
        }

        if(o.y > height+100){

            if(o.type==='bubble') score++;

            o.dead=true;
        }

        if(
            o.x < -150 ||
            o.x > width+150
        ){

            o.dead=true;
        }
    });

    for(let i=0;i<objects.length;i++){

        let pb = objects[i];

        if(pb.dead ||
           pb.type!=='playerBullet') continue;

        for(let j=0;j<objects.length;j++){

            let target = objects[j];

            if(
                target.dead ||
                (
                    target.type!=='bubble' &&
                    target.type!=='bomb' &&
                    target.type!=='smallShark' &&
                    target.type!=='explosiveShark'
                )
            ) continue;

            let dx = pb.x-target.x;
            let dy = pb.y-target.y;

            if(
                Math.sqrt(dx*dx+dy*dy)
                <
                pb.size + target.size
            ){

                pb.dead=true;
                target.dead=true;

                score += 5;

                break;
            }
        }
    }

    objects = objects.filter(o=>!o.dead);

    document.getElementById('score').innerText = score;

    document.getElementById('level').innerText = level;

    document.getElementById('hp-fill').style.width =
    (hp/maxHp*100)+'%';

    document.getElementById('ep-fill').style.width =
    (energy/maxEnergy*100)+'%';
}

function loop(){

    if(sargassoMode){

        drawSargassoBackground();

    }else{

        let bgHue = 220 + (level*8);

        ctx.fillStyle =
        isBossMode
        ? "#1a0505"
        : "hsl(" + Math.min(bgHue,360) + ",100%,8%)";

        ctx.fillRect(0,0,width,height);
    }

    particles.forEach(p=>{

        p.y += p.v;

        if(p.y > height) p.y=0;

        ctx.fillStyle="rgba(255,255,255,0.15)";

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
        ctx.fill();
    });

    if(isBossMode) drawTurtle();

    if(sharkBossMode) drawSharkBoss();

    objects.forEach(o=>{

        if(o.type==='bubble')
            drawBubble(o);

        else if(o.type==='alga')
            drawAlga(o);

        else if(o.type==='smallShark')
            drawSmallShark(o);

        else if(o.type==='explosiveShark')
            drawExplosiveShark(o);

        else if(o.type==='bomb'){

            ctx.fillStyle="#333";

            ctx.beginPath();
            ctx.arc(o.x,o.y,o.size,0,Math.PI*2);
            ctx.fill();

            let pulse =
            Math.abs(Math.sin(Date.now()*0.01));

            ctx.fillStyle =
            "rgba(255,0,0,"+pulse+")";

            ctx.beginPath();
            ctx.arc(o.x,o.y,o.size/2,0,Math.PI*2);
            ctx.fill();
        }

        else if(
            o.type==='bullet' ||
            o.type==='playerBullet'
        ){

            ctx.fillStyle =
            o.type==='bullet'
            ? "red"
            : "#00ffff";

            ctx.beginPath();
            ctx.arc(o.x,o.y,o.size,0,Math.PI*2);
            ctx.fill();
        }

        else if(o.type==='star'){

            ctx.fillStyle="yellow";

            ctx.beginPath();
            ctx.arc(o.x,o.y,10,0,Math.PI*2);
            ctx.fill();
        }
    });

    drawPlayer();

    update();

    requestAnimationFrame(loop);
}

window.addEventListener('mousemove',e=>{

    if(gameStarted){

        player.x = e.clientX;
        player.y = e.clientY;
    }
});

window.addEventListener('touchmove',e=>{

    if(gameStarted){

        e.preventDefault();

        player.x = e.touches[0].clientX;
        player.y = e.touches[0].clientY;
    }

},{passive:false});

document.getElementById('play-btn').onclick = ()=>{

    document.getElementById('start-screen').style.display='none';

    gameStarted=true;

    spawn();
};

loop();

</script>

</body>
</html>
