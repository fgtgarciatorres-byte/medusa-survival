<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish Survival: Arcade Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000511; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* OVERLAY 100% COMPATIBLE: Sin backdrop-filter que buguee la pantalla */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 15, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; }
        
        #ui { position: fixed; top: 20px; width: 100%; display: none; justify-content: space-around; align-items: center; color: #00d4ff; font-weight: bold; font-size: 18px; z-index: 500; pointer-events: none; text-shadow: 0 0 10px #00d4ff; }
        
        #inventory-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; gap: 30px; padding: 10px 0; border-top: 2px solid #ff00ff; z-index: 1000; font-size: 16px; text-shadow: 0 0 5px black; }
        .inv-item { display: flex; align-items: center; gap: 8px; }

        .hp-bar-container { border: 2px solid white; border-radius: 10px; padding: 2px; transition: border-color 0.3s; }
        .hp-bar-container.extra-life { border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .hp-bar { width: 80px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff3300, #ff6600); transition: width 0.3s, background 0.3s; }
        
        button { padding: 15px 30px; background: #ff00ff; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; box-shadow: 0 0 15px #ff00ff; cursor: pointer; margin: 10px; transition: 0.2s; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; background: rgba(0,0,0,0.6); color: yellow; font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; width: 120px; text-transform: uppercase; letter-spacing: 5px; }

        .char-grid { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; z-index: 10001; }
        .char-card { background: rgba(255,255,255,0.05); border: 2px solid #444; padding: 15px; border-radius: 15px; width: 100px; cursor: pointer; position: relative; }
        .char-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .char-card.locked { opacity: 0.5; cursor: not-allowed; }
        .char-card.locked::after { content: "🔒"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }
        
        #event-alert { position: fixed; top: 100px; width: 100%; text-align: center; color: #ff3300; font-size: 28px; font-weight: 900; display: none; text-shadow: 0 0 20px red; z-index: 400; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .profile-panel { background: rgba(0,212,255,0.1); border: 2px solid #00d4ff; padding: 20px; border-radius: 15px; margin: 15px 0; min-width: 250px; text-align: left; }
    </style>
</head>
<body>

    <div id="ui">
        <div>PTS: <span id="score">0</span></div>
        <div style="display:flex; align-items:center; gap:8px;">
            ❤️ 
            <div id="hp-container" class="hp-bar-container">
                <div class="hp-bar"><div id="hp-fill"></div></div>
            </div>
        </div>
        <div>LVL: <span id="level">1</span></div>
    </div>

    <div id="inventory-bar">
        <div class="inv-item">💎 <span id="inv-diamonds">0</span> / 10</div>
        <div class="inv-item">🏆 <span id="inv-trophies">0</span></div>
    </div>

    <div id="event-alert">¡JEFE TORTUGA AL ACECHO! 🐢</div>

    <div id="start-screen" class="overlay">
        <h1 style="color:#ff00ff; font-size:40px; margin:0; text-shadow: 0 0 20px #ff00ff;">🪼 JELLYFISH</h1>
        <p style="margin-bottom: 5px;">INICIALES DEL JUGADOR</p>
        <p style="font-size: 12px; opacity: 0.7; margin-top: 0;">(Máximo 3 letras)</p>
        <input type="text" id="player-name-input" placeholder="AAA" maxlength="3">
        <button id="to-char-select">ACCEDER</button>
    </div>

    <div id="char-select-screen" class="overlay" style="display:none;">
        <h2>SELECCIONA TU AVATAR</h2>
        <div class="char-grid" id="char-grid">
            <div id="char-jellyfish" class="char-card selected" onclick="selectChar('jellyfish', 0)">
                <div style="font-size:30px">🪼</div><p>Medusa</p>
            </div>
            <div id="char-crab" class="char-card locked" onclick="selectChar('crab', 150)">
                <div style="font-size:30px">🦀</div><p>Cangrejo</p>
            </div>
            <div id="char-octopus" class="char-card locked" onclick="selectChar('octopus', 250)">
                <div style="font-size:30px">🐙</div><p>Pulpo</p>
            </div>
        </div>
        <button id="play-btn" style="background:#00d4ff; box-shadow: 0 0 15px #00d4ff;">¡A NADAR!</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <h1 style="color:#ff3300; font-size:35px; margin:0;">¡FIN DEL VIAJE!</h1>
        <p>Puntos: <span id="final-score" style="color:#00d4ff; font-size: 24px; font-weight: bold;">0</span></p>
        <div class="profile-panel">
            <h2 style="margin: 0 0 15px 0; color: yellow; text-align: center; letter-spacing: 3px;">PERFIL: <span id="go-name">AAA</span></h2>
            <div style="display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 10px;">
                <span>Récord:</span> <span id="go-best" style="color:#ff00ff; font-weight: bold;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 18px;">
                <span>Inventario:</span> <span>💎 <span id="go-diamonds">0</span> &nbsp;|&nbsp; 🏆 <span id="go-trophies">0</span></span>
            </div>
        </div>
        <button onclick="location.reload()">VOLVER AL INICIO</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Calculo de tamaño super seguro
        let width = window.innerWidth > 0 ? window.innerWidth : 360;
        let height = window.innerHeight > 0 ? window.innerHeight : 640;
        
        const resize = function() { 
            width = canvas.width = window.innerWidth > 0 ? window.innerWidth : 360; 
            height = canvas.height = window.innerHeight > 0 ? window.innerHeight : 640; 
        };
        window.addEventListener('resize', resize); 
        resize();

        let audioCtx, gameStarted = false, gameOver = false;
        let score = 0, hp = 3, maxHp = 3, level = 1, shieldTime = 0, invulTime = 0;
        let isBossMode = false, bossX = width/2, bossDir = 3, bossShots = 0, nextBossAt = 50;
        let lastShootingLevel = 0, shootingTime = 0, lastShotFired = 0;

        let playerName = "AAA";
        let allProfiles = {};
        let userData = { bestScore: 0, diamonds: 0, trophies: 0 }; 

        try {
            let saved = localStorage.getItem('jellyProfilesV4');
            if (saved) allProfiles = JSON.parse(saved);
        } catch(e) {}

        function saveProfile() {
            try {
                allProfiles[playerName] = userData;
                localStorage.setItem('jellyProfilesV4', JSON.stringify(allProfiles));
            } catch(e) {}
        }

        let player = { x: width/2, y: height/2, r: 25 };
        let objects = [];
        let particles = [];
        for(let i=0; i<30; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                s: Math.random() * 2 + 1,
                v: Math.random() * 0.5 + 0.1
            });
        }

        let selectedCharacter = 'jellyfish';

        function updateGlobalUI() {
            try {
                document.getElementById('inv-diamonds').innerText = userData.diamonds || 0;
                document.getElementById('inv-trophies').innerText = userData.trophies || 0;
                if((userData.bestScore || 0) >= 150) document.getElementById('char-crab').classList.remove('locked');
                if((userData.bestScore || 0) >= 250) document.getElementById('char-octopus').classList.remove('locked');
            } catch(e) {}
        }

        // --- MANEJO DE EVENTOS ROBUSTO ---
        document.getElementById('to-char-select').onclick = function() {
            try {
                let inputName = document.getElementById('player-name-input').value.trim().toUpperCase().substring(0,3);
                if(inputName.length === 0) inputName = "AAA";
                playerName = inputName;

                if(!allProfiles[playerName]) allProfiles[playerName] = { bestScore: 0, diamonds: 0, trophies: 0 };
                userData = allProfiles[playerName];

                updateGlobalUI();
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('char-select-screen').style.display = 'flex';
                document.getElementById('inventory-bar').style.display = 'flex'; 
            } catch (err) { alert("Aviso: " + err.message); }
        };

        function selectChar(type, req) {
            if((userData.bestScore || 0) < req) return; 
            selectedCharacter = type;
            let cards = document.querySelectorAll('.char-card');
            for(let i=0; i<cards.length; i++) cards[i].classList.remove('selected'); // Viejo bucle 'for' compatible
            document.getElementById('char-' + type).classList.add('selected');
        }

        const startGame = function() {
            try {
                if (window.AudioContext || window.webkitAudioContext) {
                    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if(audioCtx.state === 'suspended') audioCtx.resume().catch(function(){});
                }
            } catch(e) {}
            
            if (userData.trophies > 0) {
                userData.trophies--; maxHp = 6;
                document.getElementById('hp-container').classList.add('extra-life');
                document.getElementById('hp-fill').style.background = "linear-gradient(90deg, #ffd700, #ffaa00)";
                saveProfile(); updateGlobalUI();
            } else { maxHp = 3; }
            
            hp = maxHp; 
            gameStarted = true;
            player.x = width / 2;
            player.y = height * 0.8; 

            document.getElementById('char-select-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            spawn();
        };
        document.getElementById('play-btn').onclick = startGame;

        function finishGame() {
            gameOver = true;
            if(score > (userData.bestScore || 0)) userData.bestScore = score;
            saveProfile(); 
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
            document.getElementById('go-name').innerText = playerName;
            document.getElementById('go-best').innerText = userData.bestScore;
            document.getElementById('go-diamonds').innerText = userData.diamonds;
            document.getElementById('go-trophies').innerText = userData.trophies;
        }

        function playSnd(f, type, d) {
            type = type || 'sine'; d = d || 0.15;
            if(!audioCtx) return;
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(0.04, audioCtx.currentTime);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        // --- ARTE GRÁFICO REESCRITO SIN FUNCIONES INCOMPATIBLES ---
        function drawPlayer() {
            ctx.save();
            let time = Date.now() * 0.005;
            if (invulTime > 0 && Math.floor(Date.now()/100)%2 === 0) ctx.globalAlpha = 0.3;
            ctx.shadowBlur = shieldTime > 0 ? 20 : 15; 
            ctx.shadowColor = shieldTime > 0 ? "cyan" : (selectedCharacter === 'jellyfish' ? "#ff00ff" : (selectedCharacter === 'crab' ? "#ff3300" : "#a000ff"));

            if (selectedCharacter === 'jellyfish') {
                ctx.strokeStyle = shieldTime > 0 ? "cyan" : "rgba(230, 180, 255, 0.8)"; ctx.lineWidth = 3.5;
                for(let i=0; i<5; i++) {
                    ctx.beginPath(); ctx.moveTo(player.x - 16 + i*8, player.y + 12);
                    for(let j=0; j<4; j++) {
                        let ox = Math.sin(time + i*0.8 + j*0.5) * 10;
                        ctx.quadraticCurveTo(player.x-16+i*8+ox, player.y+20+j*10, player.x-16+i*8, player.y+35+j*10);
                    }
                    ctx.stroke();
                }
                ctx.fillStyle = shieldTime > 0 ? "#bbffff" : "#e699ff"; // Color solido seguro
                ctx.beginPath(); ctx.arc(player.x, player.y, player.r, Math.PI, 0);
                ctx.lineTo(player.x+player.r, player.y+15); ctx.quadraticCurveTo(player.x, player.y+25, player.x-player.r, player.y+15); ctx.fill();
            } 
            else if (selectedCharacter === 'crab') {
                ctx.translate(player.x, player.y); ctx.fillStyle = "#e63900"; 
                ctx.save(); ctx.scale(1, 18/25); ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill(); ctx.restore(); // Polyfill de ellipse
                let legM = Math.sin(time*3) * 5; ctx.strokeStyle = "#e63900"; ctx.lineWidth = 4;
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.moveTo(-15, 5-i*5); ctx.lineTo(-28-legM, 10-i*5); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(15, 5-i*5); ctx.lineTo(28+legM, 10-i*5); ctx.stroke();
                }
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-8,-10,5,0,Math.PI*2); ctx.arc(8,-10,5,0,Math.PI*2); ctx.fill();
            }
            else if (selectedCharacter === 'octopus') {
                ctx.fillStyle = "#a000ff";
                for(let i=0; i<8; i++) {
                    let ang = (i / 7) * Math.PI + time * 0.5; ctx.beginPath(); ctx.moveTo(player.x + Math.cos(ang)*10, player.y);
                    ctx.quadraticCurveTo(player.x + Math.cos(ang)*30, player.y + 40 + Math.sin(time+i)*10, player.x + Math.cos(ang)*5, player.y + 10);
                    ctx.strokeStyle = "#7000cc"; ctx.lineWidth = 6; ctx.stroke();
                }
                ctx.save(); ctx.translate(player.x, player.y); ctx.scale(1, 28/25); ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill(); ctx.restore();
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x-10, player.y, 6, 0, Math.PI*2); ctx.arc(player.x+10, player.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(player.x-10, player.y, 3, 0, Math.PI*2); ctx.arc(player.x+10, player.y, 3, 0, Math.PI*2); ctx.fill();
            }

            if(selectedCharacter === 'jellyfish') {
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 5, 0, Math.PI*2); ctx.arc(player.x+8, player.y-5, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 2.5, 0, Math.PI*2); ctx.arc(player.x+8, player.y-5, 2.5, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        function drawBubble(o) {
            ctx.save();
            ctx.fillStyle = "rgba(180, 220, 255, 0.4)"; // Color sólido muy seguro para moviles
            ctx.beginPath(); ctx.arc(o.x, o.y, Math.max(1, o.size), 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1; ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.beginPath(); ctx.arc(o.x - o.size/3, o.y - o.size/3, o.size/4, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function spawn() {
            if (gameOver || isBossMode || !gameStarted) return;
            let r = Math.random();
            let type = (r > 0.985) ? 'crab' : (r > 0.95 ? 'shield' : (r > 0.88 ? 'star' : (r > 0.80 && level >= 2 ? 'bomb' : 'bubble')));
            let initVx = type === 'bubble' ? (Math.random() - 0.5) * 3 : (type === 'crab' ? 2.5 : 0);
            objects.push({ x: type === 'crab' ? -50 : Math.random()*width, y: type === 'crab' ? height*0.85 : -50, vx: initVx, vy: type === 'crab' ? 0 : 2.5 + level*0.4, size: 22, type: type, t: 120, dead: false });
            setTimeout(spawn, Math.max(300, 1100 - (level * 70)));
        }

        function update() {
            if(!gameStarted || gameOver) return;
            if (player.x < player.r) player.x = player.r;
            if (player.x > width - player.r) player.x = width - player.r;
            if (player.y < 180) player.y = 180; 
            if (player.y > height - player.r) player.y = height - player.r;

            level = Math.floor(score/40) + 1;
            if (level % 5 === 0 && level !== lastShootingLevel) {
                lastShootingLevel = level; shootingTime = 10000;
                document.getElementById('event-alert').innerText = "¡FRENESÍ DE DISPARO!";
                document.getElementById('event-alert').style.display = 'block';
                setTimeout(function() { if(!isBossMode) document.getElementById('event-alert').style.display = 'none'; }, 2000);
            }

            if (shootingTime > 0 && !isBossMode) {
                shootingTime -= 16;
                if (Date.now() - lastShotFired > 300) {
                    objects.push({ x: player.x, y: player.y - player.r, vx: 0, vy: -10, size: 6, type: 'playerBullet', dead: false });
                    lastShotFired = Date.now();
                }
            }

            shieldTime = Math.max(0, shieldTime - 16); invulTime = Math.max(0, invulTime - 16);

            // LOGICA DE COLISIONES VIEJA ESCUELA (A PRUEBA DE BOMBAS)
            for (let i = 0; i < objects.length; i++) {
                let o = objects[i];
                if (o.dead) continue;

                o.x += o.vx; o.y += o.vy;
                if (o.type === 'bubble' && (o.x < o.size || o.x > width - o.size)) o.vx *= -1;
                
                if (o.type === 'bomb' && (--o.t <= 0 || o.y > height - o.size)) {
                    for(let k=0; k<4; k++) {
                        let ang = Math.random() * Math.PI * 2;
                        objects.push({x:o.x, y:o.y, vx:Math.cos(ang)*4, vy:Math.sin(ang)*4, size:8, type:'bullet', dead: false});
                    }
                    o.dead = true; continue;
                }

                if (o.type !== 'playerBullet' && o.type !== 'shrapnel') {
                    // Distancia clasica sin Math.hypot para max compatibilidad
                    let dx = player.x - o.x; let dy = player.y - o.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < player.r + o.size - 6) {
                        if (o.type === 'star') { score += 15; playSnd(800); }
                        else if (o.type === 'diamond') {
                            userData.diamonds++;
                            if (userData.diamonds >= 10) { userData.diamonds = 0; userData.trophies++; playSnd(1200, 'triangle', 0.5); } 
                            else { playSnd(1500, 'sine', 0.1); }
                            saveProfile(); updateGlobalUI();
                        }
                        else if (o.type === 'shield') { shieldTime = 6000; playSnd(1000); }
                        else if (o.type === 'crab') { hp = Math.min(maxHp, hp + 1); playSnd(600); }
                        else if (shieldTime <= 0 && invulTime <= 0) {
                            hp--; invulTime = 1500; playSnd(80, 'sawtooth');
                            if (hp <= 0) finishGame();
                        }
                        if (o.type !== 'bullet' || shieldTime > 0) o.dead = true;
                    } else if (o.y > height + 100) { 
                        if(o.type==='bubble') score++; 
                        o.dead = true; 
                    }
                }
            }

            // Colisiones de Balas
            for (let i = 0; i < objects.length; i++) {
                let pb = objects[i];
                if (pb.dead || (pb.type !== 'playerBullet' && pb.type !== 'shrapnel')) continue;
                for (let j = 0; j < objects.length; j++) {
                    let target = objects[j];
                    if (target.dead || (target.type !== 'bubble' && target.type !== 'bomb')) continue;
                    let dx = pb.x - target.x; let dy = pb.y - target.y;
                    if (Math.sqrt(dx*dx + dy*dy) < pb.size + target.size) {
                        if (target.type === 'bubble' && Math.random() > 0.6) objects.push({ x: target.x, y: target.y, vx: 0, vy: 3, size: 10, type: 'diamond', dead:false });
                        if (target.type === 'bomb') {
                            for(let k=0; k<8; k++) {
                                let ang = (k / 8) * Math.PI * 2; objects.push({ x: target.x, y: target.y, vx: Math.cos(ang)*5, vy: Math.sin(ang)*5, size: 6, type: 'shrapnel', dead:false });
                            }
                            score += 10;
                        }
                        pb.dead = true; target.dead = true; break;
                    }
                }
            }

            // Limpieza de objetos muertos
            for (let i = objects.length - 1; i >= 0; i--) {
                if (objects[i].dead) objects.splice(i, 1);
            }

            document.getElementById('score').innerText = score; document.getElementById('level').innerText = level; 
            document.getElementById('hp-fill').style.width = (hp/maxHp*100) + '%';
        }

        // BUCLE A PRUEBA DE FALLOS
        function loop() {
            try {
                ctx.fillStyle = "#000511"; ctx.fillRect(0,0,width,height);
                for(let i=0; i<particles.length; i++){
                    let p = particles[i];
                    p.y += p.v; if(p.y > height) p.y = 0; 
                    ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                }
                
                for(let i=0; i<objects.length; i++) {
                    let o = objects[i];
                    if(o.type === 'bubble') drawBubble(o); 
                    else if(o.type === 'diamond') {
                        ctx.fillStyle = "#00ffff"; ctx.shadowBlur = 10; ctx.shadowColor = "#00ffff";
                        ctx.beginPath(); ctx.moveTo(o.x, o.y-10); ctx.lineTo(o.x+10, o.y); ctx.lineTo(o.x, o.y+10); ctx.lineTo(o.x-10, o.y); ctx.fill(); ctx.shadowBlur = 0;
                    } else if(o.type === 'star') {
                        ctx.save(); ctx.translate(o.x, o.y); ctx.fillStyle = "yellow"; ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
                        ctx.beginPath();
                        for (let j = 0; j < 5; j++) {
                            ctx.lineTo(Math.cos((18+j*72)/180*Math.PI)*o.size, -Math.sin((18+j*72)/180*Math.PI)*o.size);
                            ctx.lineTo(Math.cos((54+j*72)/180*Math.PI)*(o.size/2.5), -Math.sin((54+j*72)/180*Math.PI)*(o.size/2.5));
                        }
                        ctx.closePath(); ctx.fill(); ctx.restore();
                    } else if(o.type === 'shield') {
                        ctx.fillStyle = "#00ffff"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
                        ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, Math.PI*2); ctx.fill(); 
                        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(o.x, o.y, o.size/2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    } else if(o.type === 'bomb') {
                        ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, Math.PI*2); ctx.fill();
                        let pulse = Math.abs(Math.sin(Date.now() * (0.01 + (120 - o.t)*0.0002)));
                        ctx.fillStyle = "rgba(255, 0, 0, " + pulse + ")"; ctx.shadowBlur = 10; ctx.shadowColor = "red";
                        ctx.beginPath(); ctx.arc(o.x, o.y, o.size/2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    } else if(o.type === 'playerBullet' || o.type === 'shrapnel') {
                        ctx.fillStyle = o.type === 'shrapnel' ? "#ffaa00" : "#00ffff"; ctx.shadowBlur = 5; ctx.shadowColor = "#fff";
                        ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    } else if(o.type === 'bullet') {
                        ctx.fillStyle = "red"; ctx.shadowBlur = 5; ctx.shadowColor = "red";
                        ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    } else if(o.type === 'crab') {
                        ctx.save(); ctx.translate(o.x, o.y); ctx.fillStyle = "#e63900"; 
                        ctx.scale(1, 16/22); ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill(); ctx.restore();
                    }
                }
                
                if(!gameStarted) { player.x = width / 2; player.y = height * 0.7 + Math.sin(Date.now()*0.002)*15; }
                drawPlayer(); 
                if(gameStarted) update(); 

            } catch(fatalError) { }
            requestAnimationFrame(loop);
        }

        window.addEventListener('touchmove', function(e) { if(gameStarted) { player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; } }, {passive: false});
        window.addEventListener('mousemove', function(e) { if(gameStarted) { player.x = e.clientX; player.y = e.clientY; } });
        
        loop();
    </script>
</body>
</html>
