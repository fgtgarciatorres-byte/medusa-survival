<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish Survival: Mar de los Sargazos</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000511; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 15, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; }
        #ui { position: fixed; top: 20px; width: 100%; display: none; justify-content: center; gap: 15px; align-items: center; color: #00d4ff; font-weight: bold; font-size: 16px; z-index: 500; pointer-events: none; text-shadow: 0 0 10px #00d4ff; flex-wrap: wrap; }
        #inventory-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; gap: 30px; padding: 10px 0; border-top: 2px solid #ff00ff; z-index: 1000; font-size: 16px; text-shadow: 0 0 5px black; }
        .inv-item { display: flex; align-items: center; gap: 8px; }
        .bar-container { border: 2px solid white; border-radius: 10px; padding: 2px; background: rgba(0,0,0,0.5); }
        .bar { width: 60px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff3300, #ff6600); transition: width 0.3s; }
        #ep-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffcc, #0088ff); transition: width 0.3s; }
        button { padding: 15px 30px; background: #ff00ff; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; box-shadow: 0 0 15px #ff00ff; cursor: pointer; margin: 10px; transition: 0.2s; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; background: rgba(0,0,0,0.6); color: yellow; font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; width: 120px; text-transform: uppercase; letter-spacing: 5px; }
        .char-grid { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .char-card { background: rgba(255,255,255,0.05); border: 2px solid #444; padding: 15px; border-radius: 15px; width: 100px; cursor: pointer; position: relative; }
        .char-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        #event-alert { position: fixed; top: 100px; width: 100%; text-align: center; color: #00ffcc; font-size: 24px; font-weight: 900; display: none; text-shadow: 0 0 20px #00ffcc; z-index: 400; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui">
        <div>PTS: <span id="score">0</span></div>
        <div style="display:flex; align-items:center; gap:5px;">❤️<div class="bar-container"><div class="bar"><div id="hp-fill"></div></div></div></div>
        <div style="display:flex; align-items:center; gap:5px; color:#00ffcc;">⚡<div class="bar-container" style="border-color:#00ffcc;"><div class="bar"><div id="ep-fill"></div></div></div></div>
        <div>LVL: <span id="level">1</span></div>
    </div>

    <div id="inventory-bar">
        <div class="inv-item">💎 <span id="inv-diamonds">0</span></div>
        <div class="inv-item">🏆 <span id="inv-trophies">0</span></div>
    </div>

    <div id="event-alert">¡MENSAJE!</div>

    <div id="start-screen" class="overlay">
        <h1 style="color:#ff00ff; font-size:40px; text-shadow: 0 0 20px #ff00ff;">🪼 JELLYFISH</h1>
        <p>INICIALES</p>
        <input type="text" id="player-name-input" placeholder="AAA" maxlength="3">
        <button id="to-char-select">ACCEDER</button>
    </div>

    <div id="char-select-screen" class="overlay" style="display:none;">
        <h2>SELECCIONA AVATAR</h2>
        <div class="char-grid">
            <div id="char-jellyfish" class="char-card selected" onclick="selectChar('jellyfish')">
                <div style="font-size:30px">🪼</div><p>Medusa</p>
            </div>
            <div id="char-crab" class="char-card" onclick="selectChar('crab')">
                <div style="font-size:30px">🦀</div><p>Cangrejo</p>
            </div>
        </div>
        <button id="play-btn">¡A NADAR!</button>
    </div>

    <audio id="bgMusic" loop><source src="Button_Bop_Logic.mp3" type="audio/mpeg"></audio>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;
const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
window.addEventListener('resize', resize); resize();

let audioCtx, gameStarted = false, score = 0, hp = 3, maxHp = 3, level = 1, energy = 0, maxEnergy = 6;
let invulTime = 0, shootingTime = 0, turtleDefeats = 0, sargassoMode = false, isBossMode = false;
let bossX = 0, bossDir = 3, player = { x: 0, y: 0, r: 25 }, objects = [], particles = [], backSeaweed = [];

for(let i=0; i<15; i++) backSeaweed.push({ x: Math.random()*window.innerWidth, h: 200+Math.random()*300, sway: Math.random()*Math.PI*2 });

function drawPlayer() {
    ctx.save(); let time = Date.now()*0.005;
    if(invulTime > 0 && Math.floor(Date.now()/100)%2 === 0) ctx.globalAlpha = 0.3;
    ctx.shadowBlur = 15; ctx.shadowColor = "#ff00ff";
    ctx.strokeStyle='rgba(230,180,255,0.8)'; ctx.lineWidth=3.5;
    for(let i=0; i<5; i++) {
        ctx.beginPath(); ctx.moveTo(player.x-16+i*8, player.y+12);
        for(let j=0; j<4; j++) ctx.quadraticCurveTo(player.x-16+i*8+Math.sin(time+i*0.8+j*0.5)*10, player.y+20+j*10, player.x-16+i*8, player.y+35+j*10);
        ctx.stroke();
    }
    ctx.fillStyle='#e699ff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, Math.PI, 0); 
    ctx.lineTo(player.x+player.r, player.y+18); ctx.quadraticCurveTo(player.x, player.y+28, player.x-player.r, player.y+18); ctx.closePath(); ctx.fill();
    ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 5, 0, Math.PI*2); ctx.arc(player.x+8, player.y-5, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 2, 0, Math.PI*2); ctx.arc(player.x+8, player.y-5, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawBubble(o) {
    ctx.save(); 
    let g = ctx.createRadialGradient(o.x-o.size/3, o.y-o.size/3, o.size/10, o.x, o.y, o.size);
    g.addColorStop(0, "rgba(255,255,255,0.6)"); g.addColorStop(1, "rgba(100,200,255,0.3)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.stroke(); ctx.restore();
}

function spawn() {
    if(!gameStarted || isBossMode) return;
    let r = Math.random(), type = sargassoMode ? (r > 0.8 ? 'smallShark' : 'alga') : (r > 0.8 ? 'alga' : 'bubble');
    if(type === 'smallShark') {
        objects.push({ x: -50, y: 150+Math.random()*(height-300), vx: 4, vy: 0, size: 30, type, dead: false });
    } else {
        objects.push({ x: Math.random()*width, y: -50, vx: (Math.random()-0.5)*2, vy: 2.5, size: 22, type, dead: false });
    }
    setTimeout(spawn, 1000);
}

function update() {
    if(!gameStarted) return;
    if(!sargassoMode && score >= 50 && !isBossMode) {
        isBossMode = true; objects = []; bossX = width/2;
        document.getElementById('event-alert').innerText = "🐢 JEFE TORTUGA"; document.getElementById('event-alert').style.display = "block";
        setTimeout(() => { isBossMode = false; turtleDefeats++; if(turtleDefeats >= 2) sargassoMode = true; document.getElementById('event-alert').style.display = "none"; spawn(); }, 5000);
    }
    objects.forEach(o => {
        o.x += o.vx; o.y += o.vy;
        if(Math.hypot(player.x-o.x, player.y-o.y) < player.r + o.size) {
            if(o.type === 'bubble' || o.type === 'smallShark') { hp--; invulTime = 1500; }
            else if(o.type === 'alga') { energy = Math.min(maxEnergy, energy+1); }
            o.dead = true;
        }
        if(o.y > height + 50 && o.type === 'bubble') { score++; o.dead = true; }
    });
    objects = objects.filter(o => !o.dead);
}

function loop() {
    ctx.fillStyle = sargassoMode ? "#02191c" : "#000511"; ctx.fillRect(0,0,width,height);
    if(sargassoMode) {
        backgroundSeaweed.forEach(s => {
            let w = Math.sin(Date.now()*0.002 + s.sway)*25; ctx.strokeStyle = "#2e7d32"; ctx.lineWidth = 10; ctx.beginPath();
            ctx.moveTo(s.x, height); ctx.quadraticCurveTo(s.x+w, height-s.h/2, s.x+w/2, height-s.h); ctx.stroke();
        });
    }
    objects.forEach(o => { if(o.type === 'bubble') drawBubble(o); else if(o.type === 'alga') { ctx.fillStyle="#4caf50"; ctx.beginPath(); ctx.ellipse(o.x, o.y, 8, 20, 0, 0, Math.PI*2); ctx.fill(); } });
    if(!gameStarted) { player.x = width/2; player.y = height*0.7; }
    drawPlayer(); update(); requestAnimationFrame(loop);
}

document.getElementById('to-char-select').onclick = () => { document.getElementById('start-screen').style.display = 'none'; document.getElementById('char-select-screen').style.display = 'flex'; };
document.getElementById('play-btn').onclick = () => { try { audioCtx = new AudioContext(); } catch(e){} document.getElementById('bgMusic').play(); gameStarted = true; document.getElementById('char-select-screen').style.display = 'none'; document.getElementById('ui').style.display = 'flex'; document.getElementById('inventory-bar').style.display = 'flex'; player.x = width/2; player.y = height*0.8; spawn(); };
window.addEventListener('mousemove', e => { if(gameStarted) { player.x = e.clientX; player.y = e.clientY; } });
window.addEventListener('touchmove', e => { if(gameStarted) { e.preventDefault(); player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; } }, {passive: false});
loop();
function selectChar(t) { document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected')); document.getElementById('char-'+t).classList.add('selected'); }
</script>
</body>
</html>
