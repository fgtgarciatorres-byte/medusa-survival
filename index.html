<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jellyfish Ultra Fix</title>
    <style>
        /* Estilos críticos para que nada bloquee el botón */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000511; overflow: hidden; font-family: sans-serif; }
        
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 30, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; /* El valor más alto posible */
            color: white; text-align: center;
        }

        button {
            padding: 25px 50px; background: #ff00ff; color: white;
            font-size: 28px; font-weight: bold; border: none; border-radius: 60px;
            box-shadow: 0 0 30px #ff00ff; cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Elimina flash en móvil */
        }

        #ui {
            position: fixed; top: 10px; width: 100%; display: none;
            justify-content: space-around; color: #00d4ff; font-weight: bold; z-index: 500;
        }

        .hp-bar { width: 60px; height: 10px; background: #333; border: 1px solid white; border-radius: 5px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff3300; }
    </style>
</head>
<body>

    <div id="ui">
        <div>PTS: <span id="score">0</span></div>
        <div style="display:flex; align-items:center; gap:5px;">
            ❤️ <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div>LVL: <span id="level">1</span></div>
    </div>

    <div id="start-screen">
        <h1 style="color:#ff00ff; font-size:45px; margin:0;">🪼 JELLYFISH</h1>
        <p style="margin:20px 0;">Esquiva burbujas y busca al cangrejo 🦀</p>
        <button id="main-btn" onclick="initGame()">¡JUGAR!</button>
        <p id="debug-msg" style="font-size:12px; margin-top:20px; color:gray;">Esperando inicio...</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let audioCtx, gameStarted = false, score = 0, hp = 3, level = 1;
        let objects = [], particles = [], shield = 0, invul = 0;

        // Generar partículas de fondo
        for(let i=0; i<30; i++) particles.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*2, v: Math.random()*0.5+0.1});

        // FUNCIÓN DE INICIO (La que falla)
        function initGame() {
            console.log("Intentando iniciar...");
            document.getElementById('debug-msg').innerText = "Cargando motor...";
            
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                gameStarted = true;
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('ui').style.display = 'flex';
                
                spawn();
                loop();
            } catch (e) {
                document.getElementById('debug-msg').innerText = "Error: " + e.message;
            }
        }

        // Si el botón no funciona por el onclick, lo forzamos por JS
        document.getElementById('main-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            initGame();
        });

        function spawn() {
            if (!gameStarted) return;
            let type = Math.random() > 0.9 ? 'star' : (Math.random() > 0.97 ? 'crab' : 'bubble');
            if(level >= 2 && Math.random() > 0.85) type = 'bomb';

            objects.push({
                x: type === 'crab' ? -30 : Math.random() * width,
                y: type === 'crab' ? height * 0.85 : -40,
                vx: type === 'crab' ? 2 : 0,
                vy: type === 'crab' ? 0 : 2 + level * 0.5,
                size: 20, type: type, t: 120
            });
            setTimeout(spawn, 1000 - (level * 50));
        }

        const player = { x: width/2, y: height/2, r: 22 };
        window.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX;
            player.y = e.touches[0].clientY;
        }, {passive: false});

        function loop() {
            if(!gameStarted) return;
            ctx.fillStyle = "#000511"; ctx.fillRect(0,0,width,height);

            // Partículas
            particles.forEach(p => {
                p.y += p.v; if(p.y > height) p.y = 0;
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });

            // Objetos
            for(let i=0; i<objects.length; i++) {
                let o = objects[i];
                o.x += o.vx; o.y += o.vy;
                
                // Dibujo simple para máxima compatibilidad
                ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, 7);
                ctx.fillStyle = o.type === 'star' ? 'yellow' : (o.type === 'crab' ? 'red' : 'white');
                if(o.type === 'bomb') ctx.fillStyle = 'orange';
                ctx.fill();

                // Colisión
                let d = Math.hypot(player.x - o.x, player.y - o.y);
                if(d < player.r + o.size) {
                    if(o.type === 'star') score += 10;
                    else if(o.type === 'crab') hp = Math.min(3, hp+1);
                    else { hp--; if(hp <= 0) location.reload(); }
                    objects.splice(i, 1); i--;
                }
                else if(o.y > height + 50) { if(o.type === 'bubble') score++; objects.splice(i,1); i--; }
            }

            // Medusa con tentáculos
            ctx.fillStyle = "#ff00ff";
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, Math.PI, 0); ctx.fill();
            for(let j=0; j<3; j++) ctx.fillRect(player.x-15+j*12, player.y, 4, 20);

            level = Math.floor(score/30) + 1;
            document.getElementById('score').innerText = score;
            document.getElementById('hp-fill').style.width = (hp/3*100) + '%';
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
