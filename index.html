<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish Survival Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000511; font-family: 'Arial', sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #00d4ff; font-size: 20px;
            font-weight: bold; text-shadow: 0 0 10px #00d4ff;
            pointer-events: none; user-select: none;
        }
        #boss-ui {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            color: #ff3300; font-size: 26px; font-weight: 900;
            display: none; text-shadow: 0 0 20px red; text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">PUNTOS: <span id="score">0</span> | NIVEL: <span id="level">1</span></div>
    <div id="boss-ui">¡JEFE TORTUGA!<br><small style="font-size: 14px">ESQUIVA SUS DISPAROS</small></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- SISTEMA DE SONIDO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pop') { // Burbujas
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'star') { // Estrellas
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'boss') { // Disparo jefe
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // --- VARIABLES DE JUEGO ---
        let score = 0; let level = 1; let gameOver = false;
        let shieldTime = 0; let isBossMode = false;
        let bossX = canvas.width / 2; let bossDir = 3; let bossShotsLeft = 0;

        const player = { x: canvas.width / 2, y: canvas.height * 0.8, radius: 24 };
        const objects = [];
        const particles = Array.from({ length: 30 }, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            size: Math.random() * 2, speed: Math.random() * 0.5 + 0.2
        }));

        window.addEventListener('touchstart', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); });
        window.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX; player.y = e.touches[0].clientY;
        });

        function spawnObject() {
            if (gameOver || isBossMode) return;
            const rand = Math.random();
            let type = 'obstacle';
            if (rand > 0.95) type = 'shield';
            else if (rand > 0.88) type = 'star';

            objects.push({
                x: Math.random() * canvas.width, y: -50,
                size: type === 'obstacle' ? 18 + Math.random() * 20 : 22,
                type: type, speed: 3.5 + (level * 0.4)
            });
            setTimeout(spawnObject, Math.max(250, 1100 - (level * 70)));
        }

        function startBossFight() {
            isBossMode = true;
            bossShotsLeft = 10 + (level * 2); // Aumenta disparos según nivel
            document.getElementById('boss-ui').style.display = 'block';
            objects.length = 0; // Limpiar pantalla
            spawnBossShot();
        }

        function spawnBossShot() {
            if (!isBossMode || gameOver) return;
            objects.push({ x: bossX, y: 120, size: 15, type: 'bullet', speed: 5 + level });
            playSound('boss');
            bossShotsLeft--;

            if (bossShotsLeft > 0) {
                setTimeout(spawnBossShot, 1000 - (level * 50));
            } else {
                setTimeout(() => {
                    isBossMode = false;
                    document.getElementById('boss-ui').style.display = 'none';
                    level++;
                    score += 10; // Bonus por jefe
                    spawnObject();
                }, 3000);
            }
        }

        function drawTurtle(x, y) {
            ctx.save();
            const angle = Math.sin(Date.now() * 0.005) * 0.1;
            ctx.translate(x, y);
            ctx.rotate(angle);

            // Aletas
            ctx.fillStyle = "#458b37";
            const fA = Math.sin(Date.now() * 0.01) * 0.3;
            ctx.beginPath(); ctx.ellipse(-50, 0, 30, 15, fA, 0, 7); ctx.fill(); // Izq
            ctx.beginPath(); ctx.ellipse(50, 0, 30, 15, -fA, 0, 7); ctx.fill(); // Der

            // Caparazón
            const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, 60);
            grad.addColorStop(0, "#55a64b"); grad.addColorStop(1, "#1a3a16");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.ellipse(0, 0, 60, 45, 0, 0, 7); ctx.fill();
            ctx.strokeStyle = "#0d1f0b"; ctx.lineWidth = 3; ctx.stroke();

            // Detalles caparazón
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            for(let i=0; i<3; i++) {
                ctx.beginPath(); ctx.arc(0, 0, 15 + i*15, 0, 7); ctx.stroke();
            }

            // Cabeza
            ctx.fillStyle = "#66cc5c";
            ctx.beginPath(); ctx.ellipse(0, -50, 20, 25, 0, 0, 7); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-7, -55, 6, 0, 7); ctx.arc(7, -55, 6, 0, 7); ctx.fill();
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(-7, -56, 3, 0, 7); ctx.arc(7, -56, 3, 0, 7); ctx.fill();
            ctx.restore();
        }

        function drawMedusa() {
            ctx.save();
            const time = Date.now() * 0.005;
            const invul = shieldTime > 0;
            
            if(invul) { ctx.shadowBlur = 20; ctx.shadowColor = "cyan"; }

            // Cuerpo
            const g = ctx.createRadialGradient(player.x, player.y, 5, player.x, player.y, 25);
            g.addColorStop(0, invul ? "#fff" : "#ffb3e6"); g.addColorStop(1, invul ? "#00ffff" : "#7700ee");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, Math.PI, 0);
            ctx.lineTo(player.x+player.radius, player.y+15); ctx.quadraticCurveTo(player.x, player.y+25, player.x-player.radius, player.y+15);
            ctx.fill();

            // Ojos
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 5, 0, 7); ctx.arc(player.x+8, player.y-5, 5, 0, 7); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(player.x-8, player.y-5, 2, 0, 7); ctx.arc(player.x+8, player.y-5, 2, 0, 7); ctx.fill();

            // Tentáculos
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.moveTo(player.x-16+i*8, player.y+15);
                for(let j=0; j<3; j++) {
                    const off = Math.sin(time + i) * 8;
                    ctx.quadraticCurveTo(player.x-16+i*8 + off, player.y+20+j*10, player.x-16+i*8, player.y+30+j*10);
                }
                ctx.strokeStyle = invul ? "cyan" : "#e6b3ff"; ctx.lineWidth = 3; ctx.stroke();
            }
            ctx.restore();
        }

        function update() {
            if (gameOver) return;
            if (score > 0 && score % 50 === 0 && !isBossMode) startBossFight();

            if (isBossMode) {
                bossX += bossDir;
                if (bossX > canvas.width - 60 || bossX < 60) bossDir *= -1;
            }

            shieldTime = Math.max(0, shieldTime - 16);

            for (let i = 0; i < objects.length; i++) {
                let o = objects[i];
                o.y += o.speed;
                const d = Math.hypot(player.x - o.x, player.y - o.y);

                if (d < player.radius + o.size - 5) {
                    if (o.type === 'star') { score += 15; playSound('star'); objects.splice(i, 1); i--; }
                    else if (o.type === 'shield') { shieldTime = 6000; playSound('star'); objects.splice(i, 1); i--; }
                    else if (shieldTime <= 0) { 
                        gameOver = true; alert("GAME OVER - NIVEL: " + level); location.reload(); 
                    } else { objects.splice(i, 1); i--; }
                }

                if (o.y > canvas.height + 50) {
                    if(o.type === 'obstacle') { score++; playSound('pop'); }
                    objects.splice(i, 1); i--;
                }
            }
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
        }

        function draw() {
            ctx.fillStyle = isBossMode ? "#1a0505" : "#000511";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed; if(p.y > canvas.height) p.y = 0;
                ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
            });

            if (isBossMode) drawTurtle(bossX, 80);
            objects.forEach(o => {
                ctx.beginPath(); ctx.arc(o.x, o.y, o.size, 0, 7);
                ctx.fillStyle = o.type === 'bullet' ? 'red' : (o.type === 'star' ? 'yellow' : (o.type === 'shield' ? 'cyan' : 'white'));
                if(o.type !== 'obstacle') { ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; }
                ctx.fill(); ctx.shadowBlur = 0;
            });

            drawMedusa(); update(); requestAnimationFrame(draw);
        }

        spawnObject(); draw();
    </script>
</body>
</html>
