<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jellyfish Optimized</title>
<style>
body { margin:0; background:#000511; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
// ======================
// CONFIG
// ======================
const MAX_OBJECTS = 120;
const DRAG = 0.98;
const SPAWN_RATE = 0.8;

// ======================
// CANVAS
// ======================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ======================
// DELTA TIME
// ======================
let lastTime = 0;
function getDelta(t) {
    const dt = (t - lastTime) / 16.666;
    lastTime = t;
    return dt;
}

// ======================
// PLAYER
// ======================
const player = {
    x: width / 2,
    y: height * 0.8,
    vx: 0,
    vy: 0,
    ax: 0,
    ay: 0,
    r: 25
};

// ======================
// OBJECT POOL
// ======================
class Pool {
    constructor(size) {
        this.pool = new Array(size).fill(null).map(() => ({
            active: false,
            x:0,y:0,vx:0,vy:0,size:10,type:'bubble'
        }));
    }

    get() {
        return this.pool.find(o => !o.active);
    }

    forEach(cb) {
        for (let i = 0; i < this.pool.length; i++) {
            const o = this.pool[i];
            if (o.active) cb(o, i);
        }
    }
}

const objects = new Pool(MAX_OBJECTS);

// ======================
// SPAWN
// ======================
function spawn() {
    if (Math.random() > SPAWN_RATE) return;

    const o = objects.get();
    if (!o) return;

    o.active = true;
    o.x = Math.random() * width;
    o.y = -20;
    o.vx = (Math.random() - 0.5) * 2;
    o.vy = 2 + Math.random() * 2;
    o.size = 10 + Math.random() * 15;
    o.type = 'bubble';
}

// ======================
// PHYSICS
// ======================
function updatePhysics(dt) {

    // PLAYER
    player.vx += player.ax * dt;
    player.vy += player.ay * dt;

    player.vx *= DRAG;
    player.vy *= DRAG;

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // clamp
    player.x = Math.max(player.r, Math.min(width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(height - player.r, player.y));

    // OBJECTS
    objects.forEach(o => {
        o.x += o.vx * dt;
        o.y += o.vy * dt;

        // collision
        const dx = player.x - o.x;
        const dy = player.y - o.y;
        const dist = dx*dx + dy*dy;

        if (dist < (player.r + o.size) ** 2) {
            o.active = false;
        }

        if (o.y > height + 50) o.active = false;
    });
}

// ======================
// RENDER
// ======================
const gradient = ctx.createRadialGradient(0,0,5,0,0,25);
gradient.addColorStop(0, "#ffb3e6");
gradient.addColorStop(1, "#7700ee");

function draw() {
    ctx.fillStyle = "#000511";
    ctx.fillRect(0,0,width,height);

    // player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0,0,25,Math.PI,0);
    ctx.fill();
    ctx.restore();

    // objects
    objects.forEach(o => {
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.size, 0, Math.PI*2);
        ctx.fillStyle = "rgba(100,200,255,0.5)";
        ctx.fill();
    });
}

// ======================
// INPUT
// ======================
window.addEventListener('mousemove', e => {
    player.ax = (e.clientX - player.x) * 0.02;
    player.ay = (e.clientY - player.y) * 0.02;
});

// ======================
// LOOP
// ======================
function loop(t) {
    const dt = getDelta(t);

    spawn();
    updatePhysics(dt);
    draw();

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>
</body>
</html>
