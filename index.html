<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish Survival: Mar de los Sargazos</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000511; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 15, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; }
        #ui { position: fixed; top: 20px; width: 100%; display: none; justify-content: center; gap: 15px; align-items: center; color: #00d4ff; font-weight: bold; font-size: 16px; z-index: 500; pointer-events: none; text-shadow: 0 0 10px #00d4ff; flex-wrap: wrap; }
        #inventory-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; gap: 30px; padding: 10px 0; border-top: 2px solid #ff00ff; z-index: 1000; font-size: 16px; text-shadow: 0 0 5px black; }
        .inv-item { display: flex; align-items: center; gap: 8px; }
        .bar-container { border: 2px solid white; border-radius: 10px; padding: 2px; background: rgba(0,0,0,0.5); }
        .bar { width: 60px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff3300, #ff6600); transition: width 0.3s; }
        #ep-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffcc, #0088ff); transition: width 0.3s; }
        button { padding: 15px 30px; background: #ff00ff; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; box-shadow: 0 0 15px #ff00ff; cursor: pointer; margin: 10px; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; background: rgba(0,0,0,0.6); color: yellow; font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; width: 120px; text-transform: uppercase; letter-spacing: 5px; }
        .char-grid { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .char-card { background: rgba(255,255,255,0.05); border: 2px solid #444; padding: 15px; border-radius: 15px; width: 100px; cursor: pointer; position: relative; }
        .char-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .char-card.locked { opacity: 0.5; cursor: not-allowed; }
        .char-card.locked::after { content: "🔒"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }
        #event-alert { position: fixed; top: 100px; width: 100%; text-align: center; color: #00ffcc; font-size: 24px; font-weight: 900; display: none; text-shadow: 0 0 20px #00ffcc; z-index: 400; animation: blink 0.5s infinite; }
        @keyframes blink { 0%,100% { opacity:0.2; } 50% { opacity:1; } }
    </style>
</head>
<body>

<div id="ui">
    <div>PTS: <span id="score">0</span></div>
    <div style="display:flex;align-items:center;gap:5px;">❤️<div class="bar-container"><div class="bar"><div id="hp-fill"></div></div></div></div>
    <div style="display:flex;align-items:center;gap:5px;color:#00ffcc;">⚡<div class="bar-container" style="border-color:#00ffcc;"><div class="bar"><div id="ep-fill"></div></div></div></div>
    <div>LVL: <span id="level">1</span></div>
</div>

<div id="inventory-bar">
    <div class="inv-item">💎 <span id="inv-diamonds">0</span> / 10</div>
    <div class="inv-item">🏆 <span id="inv-trophies">0</span></div>
</div>

<div id="event-alert">¡ENERGÍA AL MÁXIMO!</div>

<div id="start-screen" class="overlay">
    <h1 style="color:#ff00ff;font-size:40px;margin:0;text-shadow:0 0 20px #ff00ff;">🪼 JELLYFISH</h1>
    <input type="text" id="player-name-input" placeholder="AAA" maxlength="3">
    <button id="to-char-select">ACCEDER</button>
</div>

<div id="char-select-screen" class="overlay" style="display:none;">
    <h2>SELECCIONA TU AVATAR</h2>
    <div class="char-grid">
        <div id="char-jellyfish" class="char-card selected" onclick="selectChar('jellyfish',0)">
            <div style="font-size:30px">🪼</div><p>Medusa</p>
        </div>
        <div id="char-crab" class="char-card locked" onclick="selectChar('crab',150)">
            <div style="font-size:30px">🦀</div><p>Cangrejo</p>
        </div>
        <div id="char-octopus" class="char-card locked" onclick="selectChar('octopus',250)">
            <div style="font-size:30px">🐙</div><p>Pulpo</p>
        </div>
    </div>
    <button id="play-btn" style="background:#00d4ff;box-shadow:0 0 15px #00d4ff;">¡A NADAR!</button>
</div>

<div id="game-over-screen" class="overlay" style="display:none;">
    <h1 style="color:#ff3300; font-size:35px; margin:0;">¡FIN DEL VIAJE!</h1>
    <p>Puntos: <span id="final-score" style="color:#00d4ff; font-size: 24px; font-weight: bold;">0</span></p>
    <button onclick="location.reload()">VOLVER AL INICIO</button>
</div>

<audio id="bgMusic" loop><source src="Button_Bop_Logic.mp3" type="audio/mpeg"></audio>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;
function resize(){ width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

let audioCtx, gameStarted = false, gameOver = false, score = 0, hp = 3, maxHp = 3, level = 1, energy = 0, maxEnergy = 6;
let shieldTime = 0, invulTime = 0, shootingTime = 0, lastShotFired = 0, isBossMode = false, bossX = 0, bossDir = 3, bossShots = 0, nextBossAt = 50;
let turtleBossDefeats = 0, sargassoMode = false, sharkBossMode = false, nextSharkBossAt = 50;
let player = { x:0, y:0, r:25 }, objects = [], particles = [], backgroundSeaweed = [];
let selectedCharacter = 'jellyfish', userData = { diamonds:0, trophies:0, bestScore:0 };

for(let i=0;i<30;i++) particles.push({ x:Math.random()*width, y:Math.random()*height, s:Math.random()*2+1, v:Math.random()*0.5+0.1 });
for(let i=0;i<40;i++) backgroundSeaweed.push({ x:Math.random()*width, y:Math.random()*height, h:80+Math.random()*180, sway:Math.random()*Math.PI*2, speed:0.5+Math.random() });

function spawnBossShot() {
    if ((!isBossMode && !sharkBossMode) || gameOver) return;
    let angle = Math.atan2(player.y - 130, player.x - bossX);
    objects.push({ x: bossX, y: 130, vx: Math.cos(angle)*6, vy: Math.sin(angle)*6, size: 15, type: 'bullet', dead: false });
    bossShots--;
    if (bossShots > 0) setTimeout(spawnBossShot, 800);
    else {
        setTimeout(() => {
            if (isBossMode) {
                isBossMode = false; turtleBossDefeats++;
                if (turtleBossDefeats >= 2) { sargassoMode = true; document.getElementById('event-alert').innerText = 'MAR DE LOS SARGAZOS'; document.getElementById('event-alert').style.display = 'block'; setTimeout(()=>document.getElementById('event-alert').style.display='none', 3000); }
                nextBossAt += 100;
            } else if (sharkBossMode) { sharkBossMode = false; nextSharkBossAt += 100; }
            document.getElementById('event-alert').style.display = 'none'; spawn();
        }, 3000);
    }
}

function drawSargassoBackground(){
    ctx.fillStyle = '#02191c'; ctx.fillRect(0,0,width,height);
    backgroundSeaweed.forEach(a=>{
        let wave = Math.sin(Date.now()*0.0015 + a.sway)*18;
        ctx.strokeStyle='#4caf50'; ctx.lineWidth=5; ctx.beginPath();
        ctx.moveTo(a.x,height); ctx.quadraticCurveTo(a.x+wave, height-a.h/2, a.x+wave*0.5, height-a.h);
        ctx.stroke(); a.sway += 0.01*a.speed;
    });
}

function drawPlayer(){
    ctx.save(); let time = Date.now()*0.005;
    if (invulTime > 0 && Math.floor(Date.now()/100)%2 === 0) ctx.globalAlpha = 0.3;
    ctx.strokeStyle='rgba(230,180,255,0.8)'; ctx.lineWidth=3.5;
    for(let i=0;i<5;i++){
        ctx.beginPath(); ctx.moveTo(player.x-16+i*8,player.y+12);
        for(let j=0;j<4;j++){
            let ox = Math.sin(time+i*0.8+j*0.5)*10;
            ctx.quadraticCurveTo(player.x-16+i*8+ox, player.y+20+j*10, player.x-16+i*8, player.y+35+j*10);
        }
        ctx.stroke();
    }
    ctx.fillStyle='#e699ff'; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,Math.PI,0);
    ctx.lineTo(player.x+player.r,player.y+15); ctx.quadraticCurveTo(player.x,player.y+25,player.x-player.r,player.y+15); ctx.fill();
    ctx.restore();
}

function spawn(){
    if(gameOver || !gameStarted || isBossMode || sharkBossMode) return;
    let type;
    if(sargassoMode){
        let r = Math.random();
        type = r > 0.90 ? 'explosiveShark' : (r > 0.60 ? 'smallShark' : (r > 0.50 ? 'alga' : 'star'));
    } else {
        let r = Math.random();
        type = r > 0.96 ? 'crab' : (r > 0.90 ? 'bomb' : (r > 0.80 ? 'alga' : (r > 0.70 ? 'star' : 'bubble')));
    }
    if(type==='smallShark' || type==='explosiveShark'){
        let fromLeft = Math.random()>0.5;
        objects.push({ x:fromLeft?-80:width+80, y:180+Math.random()*(height-300), vx:fromLeft?4:-4, vy:0, size:28, type:type, t:120, dead:false });
    } else {
        objects.push({ x:type==='crab'?-50:Math.random()*width, y:type==='crab'?height*0.85:-50, vx:type==='crab'?2.5:(Math.random()-0.5)*2, vy:type==='crab'?0:2.5+level*0.4, size:22, type:type, t:120, dead:false });
    }
    setTimeout(spawn,Math.max(300,1100-(level*70)));
}

function update(){
    if(!gameStarted || gameOver) return;
    level = Math.floor(score/40) + 1;
    if(score >= nextBossAt && !isBossMode && !sargassoMode){
        isBossMode = true; bossShots = 10 + level; bossX = width/2; objects = [];
        document.getElementById('event-alert').innerText = '🐢 JEFE TORTUGA'; document.getElementById('event-alert').style.display = 'block'; setTimeout(spawnBossShot, 2000);
    }
    if(sargassoMode && score >= nextSharkBossAt && !sharkBossMode){
        sharkBossMode = true; bossShots = 18; bossX = width/2; objects = [];
        document.getElementById('event-alert').innerText = '🦈 MEGALODÓN 🦈'; document.getElementById('event-alert').style.display = 'block'; setTimeout(spawnBossShot, 2000);
    }
    if(isBossMode || sharkBossMode){ bossX += bossDir; if(bossX > width-120 || bossX < 120) bossDir *= -1; }
    invulTime = Math.max(0, invulTime-16);
    objects.forEach(o=>{
        o.x += o.vx; o.y += o.vy;
        if(o.type === 'explosiveShark' && --o.t <= 0){
            o.dead = true; for(let k=0;k<8;k++){ let ang = (k/8)*Math.PI*2; objects.push({x:o.x, y:o.y, vx:Math.cos(ang)*5, vy:Math.sin(ang)*5, size:6, type:'bullet', dead:false}); }
        }
        let dx = player.x - o.x, dy = player.y - o.y, dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < player.r + o.size - 5){
            if(['bubble', 'bullet', 'smallShark', 'explosiveShark', 'bomb'].includes(o.type)){
                if(invulTime <= 0){ hp--; invulTime = 1500; if(hp <= 0) { gameOver = true; document.getElementById('game-over-screen').style.display = 'flex'; document.getElementById('final-score').innerText = score; } }
            } else if(o.type === 'alga'){ energy = Math.min(maxEnergy, energy+1); if(energy >= maxEnergy){ energy = 0; shootingTime = 5000; } }
            o.dead = true;
        }
        if(o.y > height + 100 && o.type === 'bubble') { score++; o.dead = true; }
    });
    objects = objects.filter(o=>!o.dead);
    document.getElementById('score').innerText = score; document.getElementById('level').innerText = level;
    document.getElementById('hp-fill').style.width = (hp/maxHp*100)+'%'; document.getElementById('ep-fill').style.width = (energy/maxEnergy*100)+'%';
}

function loop(){
    if(sargassoMode) drawSargassoBackground();
    else { ctx.fillStyle = isBossMode ? '#1a0505' : `hsl(${Math.min(220 + (level*8),360)},100%,8%)`; ctx.fillRect(0,0,width,height); }
    particles.forEach(p=>{ p.y += p.v; if(p.y>height) p.y=0; ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); });
    objects.forEach(o=>{ if(o.type==='bubble') drawBubble(o); else if(o.type==='alga') drawAlga(o); });
    drawPlayer(); update(); requestAnimationFrame(loop);
}

document.getElementById('to-char-select').onclick = ()=>{ document.getElementById('start-screen').style.display='none'; document.getElementById('char-select-screen').style.display='flex'; };
document.getElementById('play-btn').onclick = ()=>{ document.getElementById('bgMusic').play(); gameStarted = true; startGame(); };
function startGame(){ document.getElementById('char-select-screen').style.display='none'; document.getElementById('ui').style.display='flex'; document.getElementById('inventory-bar').style.display='flex'; player.x = width/2; player.y = height*0.8; spawn(); }
window.addEventListener('mousemove',e=>{ if(gameStarted){ player.x = e.clientX; player.y = e.clientY; } });
window.addEventListener('touchmove',e=>{ if(gameStarted){ e.preventDefault(); player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; } },{passive:false});
loop();
</script>
</body>
</html>
