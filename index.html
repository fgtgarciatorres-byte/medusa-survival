<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Jellyfish Survival: Expansión Algas</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000511; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 15, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; }
        #ui { position: fixed; top: 20px; width: 100%; display: none; justify-content: center; gap: 15px; align-items: center; color: #00d4ff; font-weight: bold; font-size: 16px; z-index: 500; pointer-events: none; text-shadow: 0 0 10px #00d4ff; flex-wrap: wrap; }
        #inventory-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; gap: 30px; padding: 10px 0; border-top: 2px solid #ff00ff; z-index: 1000; font-size: 16px; text-shadow: 0 0 5px black; }
        .inv-item { display: flex; align-items: center; gap: 8px; }
        .bar-container { border: 2px solid white; border-radius: 10px; padding: 2px; background: rgba(0,0,0,0.5); }
        .bar { width: 60px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff3300, #ff6600); transition: width 0.3s; }
        #ep-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffcc, #0088ff); transition: width 0.3s; }
        button { padding: 15px 30px; background: #ff00ff; color: white; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; box-shadow: 0 0 15px #ff00ff; cursor: pointer; margin: 10px; transition: 0.2s; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; background: rgba(0,0,0,0.6); color: yellow; font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; width: 120px; text-transform: uppercase; letter-spacing: 5px; }
        .char-grid { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; z-index: 10001; }
        .char-card { background: rgba(255,255,255,0.05); border: 2px solid #444; padding: 15px; border-radius: 15px; width: 100px; cursor: pointer; position: relative; }
        .char-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .char-card.locked { opacity: 0.5; cursor: not-allowed; }
        .char-card.locked::after { content: "🔒"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }
        #event-alert { position: fixed; top: 100px; width: 100%; text-align: center; color: #00ffcc; font-size: 24px; font-weight: 900; display: none; text-shadow: 0 0 20px #00ffcc; z-index: 400; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .profile-panel { background: rgba(0,212,255,0.1); border: 2px solid #00d4ff; padding: 20px; border-radius: 15px; margin: 15px 0; min-width: 250px; text-align: left; }
    </style>
</head>
<body>

    <div id="ui">
        <div>PTS: <span id="score">0</span></div>
        <div style="display:flex; align-items:center; gap:5px;">
            ❤️<div class="bar-container"><div class="bar"><div id="hp-fill"></div></div></div>
        </div>
        <div style="display:flex; align-items:center; gap:5px; color:#00ffcc;">
            ⚡<div class="bar-container" style="border-color:#00ffcc;"><div class="bar"><div id="ep-fill"></div></div></div>
        </div>
        <div>LVL: <span id="level">1</span></div>
    </div>

    <div id="inventory-bar">
        <div class="inv-item">💎 <span id="inv-diamonds">0</span> / 10</div>
        <div class="inv-item">🏆 <span id="inv-trophies">0</span></div>
    </div>

    <div id="event-alert">¡ENERGÍA AL MÁXIMO!</div>

    <div id="start-screen" class="overlay">
        <h1 style="color:#ff00ff; font-size:40px; margin:0; text-shadow: 0 0 20px #ff00ff;">🪼 JELLYFISH</h1>
        <p style="margin-bottom: 5px;">INICIALES DEL JUGADOR</p>
        <p style="font-size: 12px; opacity: 0.7; margin-top: 0;">(Máximo 3 letras)</p>
        <input type="text" id="player-name-input" placeholder="AAA" maxlength="3">
        <button id="to-char-select">ACCEDER</button>
    </div>

    <div id="char-select-screen" class="overlay" style="display:none;">
        <h2>SELECCIONA TU AVATAR</h2>
        <div class="char-grid" id="char-grid">
            <div id="char-jellyfish" class="char-card selected" onclick="selectChar('jellyfish', 0)">
                <div style="font-size:30px">🪼</div><p>Medusa</p>
            </div>
            <div id="char-crab" class="char-card locked" onclick="selectChar('crab', 150)">
                <div style="font-size:30px">🦀</div><p>Cangrejo</p>
            </div>
            <div id="char-octopus" class="char-card locked" onclick="selectChar('octopus', 250)">
                <div style="font-size:30px">🐙</div><p>Pulpo</p>
            </div>
        </div>
        <button id="play-btn" style="background:#00d4ff; box-shadow: 0 0 15px #00d4ff;">¡A NADAR!</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <h1 style="color:#ff3300; font-size:35px; margin:0;">¡FIN DEL VIAJE!</h1>
        <p>Puntos: <span id="final-score" style="color:#00d4ff; font-size: 24px; font-weight: bold;">0</span></p>
        <div class="profile-panel">
            <h2 style="margin: 0 0 15px 0; color: yellow; text-align: center; letter-spacing: 3px;">PERFIL: <span id="go-name">AAA</span></h2>
            <div style="display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 10px;">
                <span>Récord:</span> <span id="go-best" style="color:#ff00ff; font-weight: bold;">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 18px;">
                <span>Inventario:</span> <span>💎 <span id="go-diamonds">0</span> &nbsp;|&nbsp; 🏆 <span id="go-trophies">0</span></span>
            </div>
        </div>
        <button onclick="location.reload()">VOLVER AL INICIO</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="Button_Bop_Logic.mp3" type="audio/mpeg">
    </audio>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth > 0 ? window.innerWidth : 360;
        let height = window.innerHeight > 0 ? window.innerHeight : 640;
        
        const resize = function() { 
            width = canvas.width = window.innerWidth > 0 ? window.innerWidth : 360; 
            height = canvas.height = window.innerHeight > 0 ? window.innerHeight : 640;
        };
        window.addEventListener('resize', resize); 
        resize();

        let audioCtx, gameStarted = false, gameOver = false;
        let score = 0, hp = 3, maxHp = 3, level = 1, shieldTime = 0, invulTime = 0;
        let energy = 0, maxEnergy = 6;
        let isBossMode = false, bossX = width/2, bossDir = 3, bossShots = 0, nextBossAt = 50;
        let shootingTime = 0, lastShotFired = 0;

        let playerName = "AAA";
        let allProfiles = {};
        let userData = { bestScore: 0, diamonds: 0, trophies: 0 }; 

        try { 
            let saved = localStorage.getItem('jellyProfilesV4'); 
            if (saved) allProfiles = JSON.parse(saved); 
        } catch(e) {}

        function saveProfile() { 
            try { 
                allProfiles[playerName] = userData; 
                localStorage.setItem('jellyProfilesV4', JSON.stringify(allProfiles)); 
            } catch(e) {} 
        }

        let player = { x: width/2, y: height/2, r: 25 };
        let objects = [];
        let particles = [];
        for(let i=0; i<30; i++) particles.push({ x: Math.random() * width, y: Math.random() * height, s: Math.random() * 2 + 1, v: Math.random() * 0.5 + 0.1 });

        let selectedCharacter = 'jellyfish';

        function updateGlobalUI() {
            try {
                document.getElementById('inv-diamonds').innerText = userData.diamonds || 0;
                document.getElementById('inv-trophies').innerText = userData.trophies || 0;
                if((userData.bestScore || 0) >= 150) document.getElementById('char-crab').classList.remove('locked');
                if((userData.bestScore || 0) >= 250) document.getElementById('char-octopus').classList.remove('locked');
            } catch(e) {}
        }

        document.getElementById('to-char-select').onclick = function() {
            try {
                let inputName = document.getElementById('player-name-input').value.trim().toUpperCase().substring(0,3);
                if(inputName.length === 0) inputName = "AAA";
                playerName = inputName;
                if(!allProfiles[playerName]) allProfiles[playerName] = { bestScore: 0, diamonds: 0, trophies: 0 };
                userData = allProfiles[playerName];
                updateGlobalUI();
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('char-select-screen').style.display = 'flex';
                document.getElementById('inventory-bar').style.display = 'flex'; 
            } catch (err) {}
        };

        function selectChar(type, req) {
            if((userData.bestScore || 0) < req) return;
            selectedCharacter = type;
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('char-' + type).classList.add('selected');
        }

        const startGame = function() {
            try { 
                if (window.AudioContext || window.webkitAudioContext) { 
                    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if(audioCtx.state === 'suspended') audioCtx.resume().catch(function(){}); 
                } 
            } catch(e) {}

            // INICIAR MÚSICA DE FONDO
            const music = document.getElementById('bgMusic');
            if(music) music.play().catch(e => console.log("Audio play blocked"));

            if (userData.trophies > 0) { 
                userData.trophies--; 
                maxHp = 6;
                document.getElementById('hp-fill').style.background = "linear-gradient(90deg, #ffd700, #ffaa00)"; 
                saveProfile(); 
                updateGlobalUI(); 
            } else { 
                maxHp = 3; 
                document.getElementById('hp-fill').style.background = "linear-gradient(90deg, #ff3300, #ff6600)";
            }
            
            hp = maxHp; 
            energy = 0; 
            gameStarted = true; 
            player.x = width / 2; 
            player.y = height * 0.8; 
            
            document.getElementById('char-select-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
        };

        document.getElementById('play-btn').onclick = startGame;

        function finishGame() {
            gameOver = true;
            // DETENER MÚSICA
            const music = document.getElementById('bgMusic');
            if(music) {
                music.pause();
                music.currentTime = 0;
            }

            if(score > (userData.bestScore || 0)) userData.bestScore = score;
            saveProfile();
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('go-name').innerText = playerName;
            document.getElementById('go-best').innerText = userData.bestScore;
            document.getElementById('go-diamonds').innerText = userData.diamonds;
            document.getElementById('go-trophies').innerText = userData.trophies;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        // Resto del bucle del juego y lógica (update, draw, etc.)
        function loop() {
            if(!gameOver) {
                ctx.clearRect(0, 0, width, height);
                // Aquí iría el resto de tu código de dibujo y lógica original...
            }
            requestAnimationFrame(loop);
        }
        loop();

    </script>
</body>
</html>
